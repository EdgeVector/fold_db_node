name: Face Discovery Self Test
description: Alice ingests a photo, face search finds self, connects to self, accepts, shares with self, notification appears
nodes:
  - role: alice
    display_name: Alice

fixtures:
  photo: fixtures/face-a.jpg

steps:
  - id: ingest
    roles: [alice]
    actions:
      - action: ingest_photo
        fixture: photo
  - id: opt_in_publish
    roles: [alice]
    depends_on: [ingest]
    actions:
      - action: opt_in_photography
        publish_faces: true
      - action: publish
  - id: face_search
    roles: [alice]
    depends_on: [opt_in_publish]
    actions:
      - action: face_search
        face_index: 0
      - action: expect_results_min
        value: 1

assertions:
  - { node: alice, field: schema_record_count, schema: Photography, op: ">=", value: 1 }
