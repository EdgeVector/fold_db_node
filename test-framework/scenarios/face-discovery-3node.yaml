name: Face Discovery 3-Node Cross-Node Flow
description: |
  Alice + Bob both ingest the same photo. Alice publishes her face embeddings.
  Bob face-searches (using his local face of the same photo). Because face-a.jpg
  is used on both nodes, the embeddings are identical and the top results include
  Alice's just-published pseudonym plus any ghost pseudonyms from prior test runs.
  Bob sprays connect requests to the top-N results — only the one actually owned
  by Alice routes to her via the bulletin board. Alice polls, accepts, shares,
  Bob receives the notification.
  Carol is spawned to demonstrate multi-node capacity.

nodes:
  - role: alice
    display_name: Alice
  - role: bob
    display_name: Bob
  - role: carol
    display_name: Carol

fixtures:
  photo: fixtures/face-a.jpg

steps:
  - id: alice_ingest
    roles: [alice]
    actions:
      - action: ingest_photo
        fixture: photo

  - id: alice_publish
    roles: [alice]
    depends_on: [alice_ingest]
    actions:
      - action: opt_in_photography
        publish_faces: true
      - action: publish

  - id: bob_ingest
    roles: [bob]
    depends_on: [alice_publish]
    actions:
      - action: ingest_photo
        fixture: photo

  - id: bob_search
    roles: [bob]
    depends_on: [bob_ingest]
    actions:
      - action: face_search
        face_index: 0
      - action: expect_results_min
        value: 1

  - id: bob_connect
    roles: [bob]
    depends_on: [bob_search]
    actions:
      - action: connect_all_results
        top_k: 20
        message: "Hi Alice from Bob — E2E test (spray)"
        role: friend

  - id: alice_accept
    roles: [alice]
    depends_on: [bob_connect]
    actions:
      - action: expect_pending_min
        value: 1
        timeout_seconds: 90
      - action: accept_request

  - id: alice_share
    roles: [alice]
    depends_on: [alice_accept]
    actions:
      - action: share_record

  - id: bob_receive
    roles: [bob]
    depends_on: [alice_share]
    actions:
      - action: expect_notification_min
        value: 1
        timeout_seconds: 90

assertions:
  - { node: alice, field: contact_count, op: ">=", value: 1 }
  - { node: bob, field: notification_count, op: ">=", value: 1 }
  # PR #396: author_pub_key plumbed through query response. Bob's Photography schema
  # should contain a record authored by Alice (the shared photo).
  - { node: bob, field: shared_record_count, schema: Photography, author_role: alice, op: ">=", value: 1 }
