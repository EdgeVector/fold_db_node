# Local-dev override: redirect cross-repo git deps to sibling checkouts
# when this repo is checked out alongside the workspace layout
# (`../fold_db`, `../schema_service`). Parallel hacking across repos
# works without publishing intermediate rev bumps.
#
# Why patching fold_db matters: without this [patch], the sibling
# `schema_service` brings in its OWN pinned `fold_db` rev (e.g.
# `rev = "46edee9..."`) while `fold_db_node/Cargo.toml` uses
# `branch = "mainline"` (HEAD). Cargo treats those as different
# source specs and compiles TWO copies of `fold_db` — every type
# re-exported through `schema_service_core` then mismatches the
# same-named type from the direct `fold_db` dep, producing a wall
# of `expected fold_db::X, found schema_service_core::Y` errors.
# Patching both git sources to the single sibling path unifies them.
#
# Production dep specs in Cargo.toml are git deps pinned via
# Cargo.lock — that's what PR CI and release builds consume, so
# main-branch drift in siblings can't silently break fold_db_node.
# CI removes this file before building (see `.github/workflows/
# ci-tests.yml` lines 49, 111) so the lockfile pins take effect.
[patch."https://github.com/EdgeVector/fold_db.git"]
fold_db       = { path = "../fold_db/crates/core" }
observability = { path = "../fold_db/crates/observability" }

[patch."https://github.com/EdgeVector/schema_service.git"]
schema_service_core        = { path = "../schema_service/crates/core" }
schema_service_client      = { path = "../schema_service/crates/client" }
schema_service_server_http = { path = "../schema_service/crates/server_http" }
