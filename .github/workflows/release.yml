name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            name: folddb-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            name: folddb-x86_64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: folddb-x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_DEPS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install mold linker (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React frontend
        working-directory: src/server/static-react
        run: |
          npm ci
          npm run build

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binaries
        env:
          RUSTFLAGS: ${{ runner.os == 'Linux' && '-C linker=clang -C link-arg=-fuse-ld=mold' || '' }}
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --bin folddb \
            --bin folddb_server \
            --bin schema_service \
            --bin folddb_mcp

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/folddb dist/
          cp target/${{ matrix.target }}/release/folddb_server dist/
          cp target/${{ matrix.target }}/release/schema_service dist/
          cp target/${{ matrix.target }}/release/folddb_mcp dist/
          tar -czf ${{ matrix.name }}.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release (fold_db_node)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz

      - name: Publish release to public fold_db repo
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_DEPS_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Create the release on the public repo (ignore error if it already exists)
          gh release create "$TAG" \
            --repo EdgeVector/fold_db \
            --title "FoldDB $TAG" \
            --notes "FoldDB $TAG release binaries (built from fold_db_node)" \
            2>/dev/null || true
          # Upload all tarball assets to the public release
          for f in artifacts/**/*.tar.gz; do
            gh release upload "$TAG" "$f" --repo EdgeVector/fold_db --clobber
          done
