name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            name: folddb-aarch64-apple-darwin
          # Cross-compile x86_64-darwin from the macos-14 (ARM) runner. macos-13
          # x86 runners are frequently queue-starved (observed 35+ min waits on
          # v0.3.5 before cancel) and are slated for deprecation; macos-14 has
          # both toolchains available.
          - target: x86_64-apple-darwin
            os: macos-14
            name: folddb-x86_64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            name: folddb-x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_DEPS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install mold linker (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React frontend
        working-directory: src/server/static-react
        run: |
          npm ci
          npm run build

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binaries
        env:
          RUSTFLAGS: ${{ runner.os == 'Linux' && '-C linker=clang -C link-arg=-fuse-ld=mold' || '' }}
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --bin folddb \
            --bin folddb_server \
            --bin schema_service \
            --bin folddb_mcp

      # Hard gate: every binary must self-report the pushed tag. Catches the
      # class of bug where CARGO_PKG_VERSION drifts from the release line
      # (shipped v0.3.1 binaries once reported 0.1.0 because build.rs was
      # never wired up). Each matrix job is native to its runner, so
      # `./...release/folddb --version` works for every target.
      - name: Verify --version matches tag
        shell: bash
        run: |
          set -euo pipefail
          expected="${GITHUB_REF_NAME#v}"
          for bin in folddb folddb_server schema_service folddb_mcp; do
            actual=$(target/${{ matrix.target }}/release/$bin --version | awk '{print $NF}')
            echo "$bin --version -> $actual (expected $expected)"
            if [ "$actual" = "0.1.0" ]; then
              echo "::error::$bin reports 0.1.0 — FOLDDB_BUILD_VERSION was not stamped from GITHUB_REF_NAME"
              exit 1
            fi
            if [ "$actual" != "$expected" ]; then
              echo "::error::$bin reports '$actual', expected '$expected' from tag $GITHUB_REF_NAME"
              exit 1
            fi
          done

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/folddb dist/
          cp target/${{ matrix.target }}/release/folddb_server dist/
          cp target/${{ matrix.target }}/release/schema_service dist/
          cp target/${{ matrix.target }}/release/folddb_mcp dist/
          tar -czf ${{ matrix.name }}.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      sha_aarch64_apple_darwin: ${{ steps.sums.outputs.sha_aarch64_apple_darwin }}
      sha_x86_64_apple_darwin: ${{ steps.sums.outputs.sha_x86_64_apple_darwin }}
      sha_x86_64_unknown_linux_gnu: ${{ steps.sums.outputs.sha_x86_64_unknown_linux_gnu }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts and generate SHA256SUMS.txt
        id: sums
        run: |
          mkdir -p release
          find artifacts -type f -name '*.tar.gz' -exec cp {} release/ \;
          cd release
          # GNU coreutils on ubuntu-latest → sha256sum; POSIX fallback to shasum.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum folddb-*.tar.gz > SHA256SUMS.txt
          else
            shasum -a 256 folddb-*.tar.gz > SHA256SUMS.txt
          fi
          cat SHA256SUMS.txt
          # Expose each sha256 as a job output keyed by target triple so the
          # bump-tap job downstream doesn't have to re-download the file.
          {
            while read -r sha file; do
              case "$file" in
                folddb-aarch64-apple-darwin.tar.gz)       echo "sha_aarch64_apple_darwin=$sha" ;;
                folddb-x86_64-apple-darwin.tar.gz)        echo "sha_x86_64_apple_darwin=$sha" ;;
                folddb-x86_64-unknown-linux-gnu.tar.gz)   echo "sha_x86_64_unknown_linux_gnu=$sha" ;;
              esac
            done < SHA256SUMS.txt
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (fold_db_node)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Tags containing a '-' (e.g. v0.3.0-alpha.brew-test) are treated as
          # prereleases so they don't replace "latest" for install.sh / brew.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release/*.tar.gz
            release/SHA256SUMS.txt

      - name: Publish release to public fold_db repo
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_DEPS_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PRERELEASE_FLAG=""
          case "$TAG" in
            *-*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          # Create the release on the public repo (ignore error if it already exists)
          gh release create "$TAG" \
            --repo EdgeVector/fold_db \
            --title "FoldDB $TAG" \
            --notes "FoldDB $TAG release binaries (built from fold_db_node)" \
            $PRERELEASE_FLAG \
            2>/dev/null || true
          # Upload all tarball assets + checksums to the public release
          for f in release/*.tar.gz release/SHA256SUMS.txt; do
            gh release upload "$TAG" "$f" --repo EdgeVector/fold_db --clobber
          done

  # Open a PR against EdgeVector/homebrew-folddb bumping the formula version
  # and sha256s for this release. Skip on prerelease tags (e.g. v0.3.0-alpha.brew-test)
  # so experimental builds don't auto-overwrite the stable formula.
  bump-tap:
    needs: release
    if: "!contains(github.ref_name, '-')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-folddb
        uses: actions/checkout@v4
        with:
          repository: EdgeVector/homebrew-folddb
          token: ${{ secrets.PRIVATE_DEPS_TOKEN }}
          path: tap

      - name: Write updated formula
        env:
          VERSION_TAG: ${{ github.ref_name }}
          SHA_AARCH64_DARWIN: ${{ needs.release.outputs.sha_aarch64_apple_darwin }}
          SHA_X86_64_DARWIN: ${{ needs.release.outputs.sha_x86_64_apple_darwin }}
          SHA_X86_64_LINUX: ${{ needs.release.outputs.sha_x86_64_unknown_linux_gnu }}
        run: |
          set -euo pipefail
          VERSION="${VERSION_TAG#v}"
          # Explicit `version` is required: Homebrew's URL version scanner
          # misparses the Linux tarball filename
          # (`folddb-x86_64-unknown-linux-gnu.tar.gz`) and extracts
          # `64-unknown-linux-gnu` as the version, landing the Cellar at
          # `Cellar/folddb/64-unknown-linux-gnu/` instead of
          # `Cellar/folddb/\${VERSION}/`. On macOS detection works, so
          # `brew audit --strict` reports this as redundant there — accept
          # the warning; a broken Linux Cellar path is worse.
          cat > tap/Formula/folddb.rb <<RUBY
          class Folddb < Formula
            desc "Local-first database for personal data sovereignty"
            homepage "https://folddb.com"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/EdgeVector/fold_db/releases/download/v${VERSION}/folddb-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64_DARWIN}"
              else
                url "https://github.com/EdgeVector/fold_db/releases/download/v${VERSION}/folddb-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64_DARWIN}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/EdgeVector/fold_db/releases/download/v${VERSION}/folddb-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_64_LINUX}"
              end
            end

            def install
              bin.install "folddb"
              bin.install "folddb_server"
              bin.install "schema_service"
            end

            def caveats
              <<~EOS
                To start the FoldDB daemon:
                  folddb daemon start

                Then open the dashboard at:
                  http://localhost:9001

                Second-device bootstrap (restore from BIP39 recovery phrase):
                  https://github.com/EdgeVector/fold_db_node/blob/main/docs/dogfood/second-device.md
              EOS
            end

            test do
              assert_match "FoldDB CLI", shell_output("#{bin}/folddb --help")
            end
          end
          RUBY

      - name: Commit and open PR
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_DEPS_TOKEN }}
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${VERSION_TAG#v}"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="auto-bump/v${VERSION}"
          git checkout -b "$BRANCH"
          if git diff --quiet Formula/folddb.rb; then
            echo "Formula already up to date for v${VERSION}; skipping."
            exit 0
          fi
          git add Formula/folddb.rb
          git commit -m "bump: folddb → v${VERSION} (auto)"
          git push -u origin "$BRANCH"
          gh pr create \
            --repo EdgeVector/homebrew-folddb \
            --title "bump: folddb → v${VERSION}" \
            --body "Auto-generated by fold_db_node release workflow for tag \`${VERSION_TAG}\`.

          Verify with:
          \`\`\`
          brew install --build-from-source edgevector/folddb/folddb
          folddb --version
          \`\`\`
          "
