name: Test Suite

# Three-tier model:
#   - Tier 1 (pull_request): fast checks every push — lint, lib + doc tests,
#     frontend. ~2-3 min. Skips integration tests, e2e, face-detection.
#   - Tier 2 (merge_group): comprehensive gate before merge — full
#     integration suite on ubuntu-latest-m (4-core/16GB), face-detection
#     (path-filtered), e2e. ~7-10 min. This is what blocks merging.
#   - Tier 3 (was push: main) — DROPPED. merge_group already validates
#     the merged commit; running the same workload again on push to main
#     is pure duplication. Branch protection on main requires the
#     `ci-required` check, which fires from merge_group.
#
# Slow / external / API-key tests run on schedule via
# nightly-integration.yml (Tier 4) — see that file.
on:
  pull_request:
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Tier 1 ──────────────────────────────────────────────────────
  # Always runs. Cheap. Caps PR-push wall time.

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends ripgrep
          fi

      - name: Run redaction lint
        run: sh scripts/lint-redaction.sh

      - name: Run spawn-instrument lint
        run: bash scripts/lint-spawn-instrument.sh

      - name: Run rev-pin format lint (cascade-relevant git deps)
        run: bash scripts/lint-rev-pin-format.sh

      - name: Run no-hardcoded-urls lint (env registry)
        run: bash scripts/lint-no-hardcoded-urls.sh

  rust-fast:
    name: Rust Fast (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: tier1-fast

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      - name: Lint tracing egress classifiers
        run: bash scripts/lint-tracing-egress.sh

      - name: Check formatting
        run: cargo fmt --all -- --check

      # PR clippy: lib + bins only (no --all-targets). Skipping the 54
      # integration test crates is the bulk of the speed win on PR. Test
      # code typecheck is still validated at merge_group via rust-full.
      - name: Run clippy (lib + bins)
        run: cargo clippy --workspace -- -D warnings

      - name: Run lib unit tests
        run: cargo nextest run --workspace --lib

      - name: Run doc tests
        run: cargo test --workspace --doc

      # OpenAPI drift check — regenerates src/types/openapi.ts from the
      # current Rust source and fails if it differs from the committed
      # file. Run `npm run generate:api` locally after backend route or
      # schema changes (run.sh dev does this automatically).
      #
      # Best-effort while the underlying utoipa coverage is incomplete:
      # the spec currently has unresolved $refs (missing ToSchema derives
      # on OllamaGenerationParams, VisionBackend, UseCaseOverride, Role,
      # and many more — tracked in gbrain projects/api-typegen-unification
      # Phase 3). Until that lands, openapi-typescript@7.x errors out, so
      # the drift verify step is gated on regen succeeding. Once Phase 3
      # is in, drop the `continue-on-error` and `if:` and require it to
      # pass.
      - name: Setup Node.js (for OpenAPI drift check)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/server/static-react
        run: npm ci

      - name: Dump current OpenAPI spec
        run: cargo run --quiet --bin openapi_dump > target/openapi.json

      - name: Regenerate OpenAPI TypeScript types
        id: regen_openapi_ts
        working-directory: src/server/static-react
        run: npm run generate:api
        continue-on-error: true

      - name: Note regen failure (informational, until Phase 3 lands)
        if: steps.regen_openapi_ts.outcome != 'success'
        run: |
          echo "::warning::npm run generate:api errored — likely unresolved \$refs in target/openapi.json. Tracked under gbrain projects/api-typegen-unification Phase 3 (utoipa coverage sweep). Drift verification skipped this run."

      - name: Verify openapi.ts is up to date (when regen succeeded)
        if: steps.regen_openapi_ts.outcome == 'success'
        run: |
          if ! git diff --exit-code src/server/static-react/src/types/openapi.ts; then
            echo "::error::src/server/static-react/src/types/openapi.ts is stale."
            echo "Run 'cargo run --bin openapi_dump > target/openapi.json && (cd src/server/static-react && npm run generate:api)' and commit the result."
            exit 1
          fi

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if frontend exists
        id: check-frontend
        run: |
          if [ -f src/server/static-react/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⏭️ **Frontend Tests** — skipped (no frontend code)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Node.js
        if: steps.check-frontend.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Install dependencies
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm ci

      - name: Run npm test
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm test

  # ─── Tier 2 ──────────────────────────────────────────────────────
  # Only runs at merge time. Comprehensive. Gates the merge.

  rust-full:
    name: Rust Full Integration
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest-m
    timeout-minutes: 30

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: tier2-full

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      # Merge-time clippy: full --all-targets sweep so test code, examples,
      # and benches all get linted before the PR is allowed to merge.
      - name: Run clippy (--all-targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Full integration suite. --features test-utils enables the two
      # test files gated on it (schema_service_expansion_test,
      # schema_service_semantic_match_test). Face-detection feature is
      # NOT enabled here — face-detection-tests below is the dedicated
      # job for that.
      - name: Run lib + integration tests
        run: cargo nextest run --workspace --features test-utils

      - name: Run doc tests
        run: cargo test --workspace --doc

  # Path filter for face-detection-tests below. Lets us skip the slow
  # ort/ndarray/onnx + 50 MB model download when the merging PR doesn't
  # touch face-detection code or its feature config.
  face-detection-paths:
    name: Face Detection Paths
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.face }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Detect face-detection-relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            face:
              - 'Cargo.toml'
              - 'src/handlers/detect_faces*.rs'
              - 'src/handlers/fingerprints/detect_faces*.rs'
              - 'tests/detect_faces_handler_test.rs'
              - '.github/workflows/ci-tests.yml'

  face-detection-tests:
    name: Face Detection Tests
    needs: face-detection-paths
    if: github.event_name == 'merge_group' && needs.face-detection-paths.outputs.changed == 'true'
    runs-on: ubuntu-latest-m
    timeout-minutes: 25

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: tier2-face-detection

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      - name: Run face-detection integration tests
        run: cargo test --features face-detection --test detect_faces_handler_test -- --nocapture

  e2e-tests:
    name: E2E UI Tests
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if E2E tests exist
        id: check-e2e
        run: |
          if [ -d src/server/static-react/e2e ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⏭️ **E2E UI Tests** — skipped (no e2e/ directory)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Node.js
        if: steps.check-e2e.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Install dependencies
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm ci

      - name: Install Playwright browsers
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npx playwright install chromium --with-deps

      - name: Run E2E smoke tests
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npx playwright test

      - name: Upload test artifacts
        if: failure() && steps.check-e2e.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/server/static-react/test-results/
          retention-days: 7

  # ─── Required check ──────────────────────────────────────────────
  # Org-wide convention: every EdgeVector repo exposes `ci-required`
  # so a single uniform check name can be wired into branch protection.
  # Treats `skipped` as success so Tier-2-only jobs don't block PR runs
  # (where Tier 2 is intentionally not running).
  ci-required:
    name: ci-required
    needs: [lint, rust-fast, rust-full, face-detection-paths, face-detection-tests, frontend-tests, e2e-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All required jobs must succeed
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Required job results: $RESULTS"
          for r in ${RESULTS//,/ }; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error::A required job did not succeed (result: $r)"
              exit 1
            fi
          done
          echo "All required jobs passed."
