name: Test Suite

# Three-tier model:
#   - Tier 1 (pull_request): fast checks every push — lint, lib + doc
#     tests, clippy --all-targets, frontend. ~3-4 min. Skips integration
#     tests, e2e, face-detection.
#   - Tier 2 (merge_group + bump-cascade PRs): comprehensive gate —
#     full integration suite, face-detection (path-filtered), e2e.
#     ~7-10 min. Runs at merge time AND on the `bot/bump-schema-service`
#     PR so cascade-bump regressions surface before queue admission
#     instead of failing in the queue (where each failure tears down
#     and rebuilds the merge group, forcing every queued PR to re-run
#     CI). Human PRs stay on Tier 1 only.
#   - Tier 3 (was push: main) — DROPPED. merge_group already validates
#     the merged commit; running the same workload again on push to main
#     is pure duplication. Branch protection on main requires the
#     `ci-required` check, which fires from merge_group.
#
# Slow / external / API-key tests run on schedule via
# nightly-integration.yml (Tier 4) — see that file.
on:
  pull_request:
  merge_group:

# Top-level permissions inherited by the reusable check-paths workflow
# call below. `pull-requests: read` is what `dorny/paths-filter` needs
# to walk the diff via the GitHub API on PR events.
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Path-filter once for the whole workflow. Tier 1 jobs gate on the
  # outputs so docs-only PRs skip them. The reusable workflow lives in
  # EdgeVector/.github (see check-paths.yml for category definitions).
  # `secrets: inherit` matches the org pattern set by auto-merge.yml.
  # ci-required treats `skipped` as success so docs-only PRs still
  # produce a green required check without doing real work.
  changes:
    uses: EdgeVector/.github/.github/workflows/check-paths.yml@main
    secrets: inherit

  # ─── Tier 1 ──────────────────────────────────────────────────────
  # Always runs. Cheap. Caps PR-push wall time.

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends ripgrep
          fi

      - name: Run redaction lint
        run: sh scripts/lint-redaction.sh

      - name: Run spawn-instrument lint
        run: bash scripts/lint-spawn-instrument.sh

      - name: Run rev-pin format lint (cascade-relevant git deps)
        run: bash scripts/lint-rev-pin-format.sh

      - name: Run no-hardcoded-urls lint (env registry)
        run: bash scripts/lint-no-hardcoded-urls.sh

  rust-fast:
    name: Rust Fast (PR)
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: tier1-fast

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      - name: Lint tracing egress classifiers
        run: bash scripts/lint-tracing-egress.sh

      - name: Check formatting
        run: cargo fmt --all -- --check

      # PR clippy: --all-targets (matches Tier 2). Lints test code on
      # every push so a clippy error in test code can't pass PR-level
      # CI, get auto-merge-admitted to the queue, and then fail
      # rust-merge-checks's --all-targets sweep — which would tear down
      # the merge group and force every queued PR to re-run CI. Costs
      # ~30s extra PR wall time; the queue-thrash alternative is much
      # more expensive (one bad PR poisons N queued PRs).
      - name: Run clippy (--all-targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run lib unit tests
        run: cargo nextest run --workspace --lib

      - name: Run doc tests
        run: cargo test --workspace --doc

      # OpenAPI drift check — regenerates src/types/openapi.ts from the
      # current Rust source and fails if it differs from the committed
      # file. Run `npm run generate:api` locally after backend route or
      # schema changes (run.sh dev does this automatically).
      - name: Setup Node.js (for OpenAPI drift check)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/server/static-react
        run: npm ci

      - name: Dump current OpenAPI spec
        run: cargo run --quiet --bin openapi_dump > target/openapi.json

      - name: Regenerate OpenAPI TypeScript types
        working-directory: src/server/static-react
        run: npm run generate:api

      - name: Verify openapi.ts is up to date
        run: |
          if ! git diff --exit-code src/server/static-react/src/types/openapi.ts; then
            echo "::error::src/server/static-react/src/types/openapi.ts is stale."
            echo "Run 'cargo run --bin openapi_dump > target/openapi.json && (cd src/server/static-react && npm run generate:api)' and commit the result."
            exit 1
          fi

  frontend-tests:
    name: Frontend Tests
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if frontend exists
        id: check-frontend
        run: |
          if [ -f src/server/static-react/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⏭️ **Frontend Tests** — skipped (no frontend code)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Node.js
        if: steps.check-frontend.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Install dependencies
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm run typecheck

      - name: Run npm test
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm test

  # ─── Tier 2 ──────────────────────────────────────────────────────
  # Only runs at merge time. Comprehensive. Gates the merge.
  #
  # Split into two jobs that fan out in parallel:
  #   - rust-merge-checks: clippy --all-targets + doc tests (single runner;
  #     neither shards usefully).
  #   - rust-full: lib + integration tests, sharded 4 ways via
  #     `cargo nextest --partition count:N/4`. Compilation is duplicated
  #     across shards but Swatinem/rust-cache hits the same key on each
  #     leg, and test execution wall-time was the bottleneck — not compile.
  # Wall time is gated by the slowest leg + ci-required join.

  rust-merge-checks:
    name: Rust Clippy + Doc Tests
    if: github.event_name == 'merge_group' || github.head_ref == 'bot/bump-schema-service'
    # TEMPORARY 2026-05-01: downgraded from `ubuntu-latest-m` (4-core
    # larger runner) to `ubuntu-latest` (2-core standard). The larger
    # runner pool wedged for 60+ min, leaving 10+ PRs stuck in the
    # merge queue with no way to land. Standard runners process
    # PR-level CI normally — falling back here drains the queue at
    # the cost of slower integration tests. Revert to `ubuntu-latest-m`
    # once the larger pool recovers (single-line edit, see #788).
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: tier2-merge-checks

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      # Merge-time clippy: full --all-targets sweep so test code, examples,
      # and benches all get linted before the PR is allowed to merge.
      - name: Run clippy (--all-targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run doc tests
        run: cargo test --workspace --doc

  rust-full:
    name: Rust Integration (shard ${{ matrix.shard }}/4)
    if: github.event_name == 'merge_group' || github.head_ref == 'bot/bump-schema-service'
    # TEMPORARY 2026-05-01: same downgrade as `rust-merge-checks`
    # above. Revert to `ubuntu-latest-m` once the larger pool recovers.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: tier2-full

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      # Full integration suite, partitioned across 4 shards. nextest
      # discovers all tests, sorts them deterministically, then runs the
      # 1/4-th slice belonging to this shard. --features test-utils
      # enables the two test files gated on it (schema_service_expansion_test,
      # schema_service_semantic_match_test). Face-detection feature is
      # NOT enabled here — face-detection-tests below is the dedicated
      # job for that.
      - name: Run lib + integration tests (shard ${{ matrix.shard }}/4)
        run: cargo nextest run --workspace --features test-utils --partition count:${{ matrix.shard }}/4

  # Path filter for face-detection-tests below. Lets us skip the slow
  # ort/ndarray/onnx + 50 MB model download when the merging PR doesn't
  # touch face-detection code or its feature config.
  face-detection-paths:
    name: Face Detection Paths
    if: github.event_name == 'merge_group' || github.head_ref == 'bot/bump-schema-service'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.face }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Detect face-detection-relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            face:
              - 'Cargo.toml'
              - 'src/handlers/detect_faces*.rs'
              - 'src/handlers/fingerprints/detect_faces*.rs'
              - 'tests/detect_faces_handler_test.rs'
              - '.github/workflows/ci-tests.yml'

  face-detection-tests:
    name: Face Detection Tests
    needs: face-detection-paths
    if: (github.event_name == 'merge_group' || github.head_ref == 'bot/bump-schema-service') && needs.face-detection-paths.outputs.changed == 'true'
    # TEMPORARY 2026-05-01: same downgrade as `rust-full` above. Revert
    # to `ubuntu-latest-m` once the larger pool recovers.
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: tier2-face-detection

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      - name: Run face-detection integration tests
        run: cargo test --features face-detection --test detect_faces_handler_test -- --nocapture

  e2e-tests:
    name: E2E UI Tests
    if: github.event_name == 'merge_group' || github.head_ref == 'bot/bump-schema-service'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if E2E tests exist
        id: check-e2e
        run: |
          if [ -d src/server/static-react/e2e ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⏭️ **E2E UI Tests** — skipped (no e2e/ directory)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Node.js
        if: steps.check-e2e.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Install dependencies
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm ci

      - name: Install Playwright browsers
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npx playwright install chromium --with-deps

      - name: Run E2E smoke tests
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npx playwright test

      - name: Upload test artifacts
        if: failure() && steps.check-e2e.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/server/static-react/test-results/
          retention-days: 7

  # ─── Required check ──────────────────────────────────────────────
  # Org-wide convention: every EdgeVector repo exposes `ci-required`
  # so a single uniform check name can be wired into branch protection.
  # Treats `skipped` as success so Tier-2-only jobs don't block PR runs
  # (where Tier 2 is intentionally not running).
  ci-required:
    name: ci-required
    needs: [changes, lint, rust-fast, rust-merge-checks, rust-full, face-detection-paths, face-detection-tests, frontend-tests, e2e-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All required jobs must succeed
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Required job results: $RESULTS"
          for r in ${RESULTS//,/ }; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error::A required job did not succeed (result: $r)"
              exit 1
            fi
          done
          echo "All required jobs passed."
