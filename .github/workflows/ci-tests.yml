name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-redaction:
    name: Redaction Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends ripgrep
          fi

      - name: Run redaction lint
        run: sh scripts/lint-redaction.sh

      - name: Run spawn-instrument lint
        run: bash scripts/lint-spawn-instrument.sh

      - name: Run Cargo.lock source-line lint
        run: bash scripts/lint-cargo-lock-sources.sh

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift
          sudo apt-get clean
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_DEPS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      # schema_service crates are git-dep'd in Cargo.toml and pinned via
      # Cargo.lock. `.cargo/config.toml` patches them to sibling paths
      # for local dev — strip it so CI consumes the lockfile-pinned git
      # dep and main-branch drift in schema_service can't silently break
      # PR CI here.
      - name: Remove local-dev cargo patch
        run: rm -f .cargo/config.toml

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      # Swap prevents OOM when linking 64-134MB test binaries
      - name: Add swap space
        run: |
          sudo fallocate -l 4G /swap2
          sudo chmod 600 /swap2
          sudo mkswap /swap2
          sudo swapon /swap2

      - name: Lint tracing egress classifiers
        run: bash scripts/lint-tracing-egress.sh

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # clippy --all-targets above already compiled every test binary;
      # nextest then links and runs them in parallel processes (~30-50%
      # faster than `cargo test`). 4GB swap (above) covers peak link
      # pressure that previously forced cli_integration into a separate
      # job.
      - name: Run unit tests
        run: cargo nextest run --workspace --lib

      - name: Run CLI integration tests
        run: cargo nextest run --test cli_integration_test --no-capture

      # nextest does not run doc tests; keep `cargo test --doc` for them.
      - name: Run doc tests
        run: cargo test --workspace --doc

  # Tiny path-filter job that face-detection-tests depends on. Lets us
  # skip the slow ort/ndarray/onnx rebuild on PRs that don't touch
  # face-detection code or its feature config. push-to-main and
  # merge-group always run (filter step is skipped, output is empty,
  # but the gate below treats non-PR events as always-run).
  face-detection-paths:
    name: Face Detection Paths
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.face }}
    steps:
      - name: Checkout repository
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
      - name: Detect face-detection-relevant changes
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            face:
              - 'Cargo.toml'
              - 'src/handlers/detect_faces*.rs'
              - 'tests/detect_faces_handler_test.rs'
              - '.github/workflows/ci-tests.yml'

  # Face-detection integration tests — separate job because the
  # `face-detection` feature pulls in ort/ndarray/image and triggers a
  # ~15 MB ONNX model download in fold_db's build.rs. Cold compile is
  # several minutes; Swatinem cache keys this distinctly from the main
  # rust-tests cache so warm runs are fast. Gated by the paths-filter
  # job above on PRs; always runs on push/merge_group.
  face-detection-tests:
    name: Face Detection Tests
    needs: face-detection-paths
    if: github.event_name != 'pull_request' || needs.face-detection-paths.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift
          sudo apt-get clean
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_DEPS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      # See comment on same step in the rust-tests job above.
      - name: Remove local-dev cargo patch
        run: rm -f .cargo/config.toml

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: face-detection

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      - name: Add swap space
        run: |
          sudo fallocate -l 4G /swap2
          sudo chmod 600 /swap2
          sudo mkswap /swap2
          sudo swapon /swap2

      # Runs the integration test added in #704. Currently the only
      # face-detection-gated test target; future face tests should land
      # in the same `--test <name>` slot or convert this to `--tests`.
      - name: Run face-detection integration tests
        run: cargo test --features face-detection --test detect_faces_handler_test -- --nocapture

  # Heavy integration tests disabled — tweets ingestion test is flaky with a 5-minute
  # timeout and fails consistently in CI. The nightly ingestion workflow
  # (nightly-ingestion.yml) covers this more reliably with a full server.
  # TODO: Re-enable once tests are stabilized.

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if frontend exists
        id: check-frontend
        run: |
          if [ -f src/server/static-react/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⏭️ **Frontend Tests** — skipped (no frontend code)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Node.js
        if: steps.check-frontend.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Install dependencies
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm ci

      - name: Run npm test
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm test

  e2e-tests:
    name: E2E UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if E2E tests exist
        id: check-e2e
        run: |
          if [ -d src/server/static-react/e2e ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⏭️ **E2E UI Tests** — skipped (no e2e/ directory)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Node.js
        if: steps.check-e2e.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Install dependencies
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm ci

      - name: Install Playwright browsers
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npx playwright install chromium --with-deps

      - name: Run E2E smoke tests
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npx playwright test

      - name: Upload test artifacts
        if: failure() && steps.check-e2e.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/server/static-react/test-results/
          retention-days: 7

  # Org-wide convention: every EdgeVector repo exposes a check named
  # `ci-required` so the org ruleset can require a single uniform check
  # across all repos. Waits for every test job above and fails if any
  # did not succeed.
  ci-required:
    name: ci-required
    needs: [lint-redaction, rust-tests, face-detection-paths, face-detection-tests, frontend-tests, e2e-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      # `skipped` is treated as success so face-detection-tests can be
      # gated by paths-filter on PRs without blocking the required
      # check. Any *failed* or *cancelled* job still fails the gate.
      - name: All required jobs must succeed
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Required job results: $RESULTS"
          for r in ${RESULTS//,/ }; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error::A required job did not succeed (result: $r)"
              exit 1
            fi
          done
          echo "All required jobs passed."
