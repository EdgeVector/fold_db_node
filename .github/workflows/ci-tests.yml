name: Test Suite

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_DEPS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      # Swap prevents OOM when linking 64-134MB test binaries
      - name: Add swap space
        run: |
          sudo fallocate -l 4G /swap2
          sudo chmod 600 /swap2
          sudo mkswap /swap2
          sudo swapon /swap2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Run lib tests — clippy already compiled the workspace, so this
      # only needs to link the test binary (~20s, not a full rebuild).
      # Integration tests are in a separate CI job to avoid OOM.
      - name: Run unit tests
        run: cargo test --workspace --lib

      - name: Run doc tests
        run: cargo test --workspace --doc

  # CLI integration tests — separate job to avoid OOM (main job compiles
  # unit tests which consume most of the 7GB runner memory).
  cli-integration-tests:
    name: CLI Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure git for private dependencies
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
        if: env.GH_PAT != ''
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      - name: Add swap space
        run: |
          sudo fallocate -l 4G /swap2
          sudo chmod 600 /swap2
          sudo mkswap /swap2
          sudo swapon /swap2

      - name: Run CLI integration tests
        run: cargo test --test cli_integration_test -- --nocapture

  # Heavy integration tests disabled — tweets ingestion test is flaky with a 5-minute
  # timeout and fails consistently in CI. The nightly ingestion workflow
  # (nightly-ingestion.yml) covers this more reliably with a full server.
  # TODO: Re-enable once tests are stabilized.

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if frontend exists
        id: check-frontend
        run: |
          if [ -f src/server/static-react/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⏭️ **Frontend Tests** — skipped (no frontend code)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Node.js
        if: steps.check-frontend.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Install dependencies
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm ci

      - name: Run npm test
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm test

  e2e-tests:
    name: E2E UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if E2E tests exist
        id: check-e2e
        run: |
          if [ -d src/server/static-react/e2e ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⏭️ **E2E UI Tests** — skipped (no e2e/ directory)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Node.js
        if: steps.check-e2e.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Install dependencies
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm ci

      - name: Install Playwright browsers
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npx playwright install chromium --with-deps

      - name: Run E2E smoke tests
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npx playwright test

      - name: Upload test artifacts
        if: failure() && steps.check-e2e.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/server/static-react/test-results/
          retention-days: 7
