name: Test Suite

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_DEPS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check AWS backend compiles
        run: cargo check --workspace --features aws-backend

      - name: Run cargo test
        run: cargo test --workspace --all-targets

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    env:
      AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
      CARGO_BUILD_JOBS: 2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if API key available
        id: check-key
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⏭️ **Integration Tests** — skipped (no API key)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Install Rust
        if: steps.check-key.outputs.available == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Configure git for private dependencies
        if: steps.check-key.outputs.available == 'true'
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_DEPS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        if: steps.check-key.outputs.available == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Stub frontend dist for rust_embed
        if: steps.check-key.outputs.available == 'true'
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      - name: Run tweets ingestion test
        if: steps.check-key.outputs.available == 'true'
        run: cargo test --test ingest_tweets_test -- --ignored
        timeout-minutes: 5

      - name: Run Twitter export scan test
        if: steps.check-key.outputs.available == 'true'
        run: cargo test --test twitter_export_scan_test -- --ignored --nocapture
        timeout-minutes: 10

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if frontend exists
        id: check-frontend
        run: |
          if [ -f src/server/static-react/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⏭️ **Frontend Tests** — skipped (no frontend code)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Node.js
        if: steps.check-frontend.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Install dependencies
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm ci

      - name: Run npm test
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm test

  e2e-tests:
    name: E2E UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if E2E tests exist
        id: check-e2e
        run: |
          if [ -d src/server/static-react/e2e ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⏭️ **E2E UI Tests** — skipped (no e2e/ directory)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Node.js
        if: steps.check-e2e.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Install dependencies
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm ci

      - name: Install Playwright browsers
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npx playwright install chromium --with-deps

      - name: Run E2E smoke tests
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npx playwright test

      - name: Upload test artifacts
        if: failure() && steps.check-e2e.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/server/static-react/test-results/
          retention-days: 7
