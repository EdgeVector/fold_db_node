name: Test Suite

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest

    env:
      AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
      FOLD_OPENROUTER_API_KEY: ${{ secrets.FOLD_OPENROUTER_API_KEY }}
      OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Build frontend (required for rust_embed)
        run: cd src/server/static-react && npm ci && npm run build

      - name: Run clippy
        id: clippy
        continue-on-error: true
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check AWS backend compiles
        id: check-aws
        continue-on-error: true
        run: cargo check --workspace --features aws-backend

      - name: Run cargo test
        id: cargo-test
        continue-on-error: true
        run: cargo test --workspace --all-targets

      - name: Run tweets ingestion integration test
        id: ingestion-test
        continue-on-error: true
        if: env.FOLD_OPENROUTER_API_KEY != ''
        run: cargo test --test ingest_tweets_test -- --ignored
        timeout-minutes: 5

      - name: Run Twitter export scan integration test
        id: twitter-scan-test
        continue-on-error: true
        if: env.FOLD_OPENROUTER_API_KEY != ''
        run: cargo test --test twitter_export_scan_test -- --ignored --nocapture
        timeout-minutes: 10

      - name: Rust test summary
        if: always()
        run: |
          for step_name in clippy check-aws cargo-test ingestion-test twitter-scan-test; do
            case "$step_name" in
              clippy)         label="Rust Clippy" ;;
              check-aws)      label="AWS Backend Check" ;;
              cargo-test)     label="Rust Tests" ;;
              ingestion-test) label="Tweets Ingestion Test" ;;
              twitter-scan-test) label="Twitter Export Scan Test" ;;
            esac
            case "$step_name" in
              clippy)         status="${{ steps.clippy.outcome }}" ;;
              check-aws)      status="${{ steps.check-aws.outcome }}" ;;
              cargo-test)     status="${{ steps.cargo-test.outcome }}" ;;
              ingestion-test) status="${{ steps.ingestion-test.outcome }}" ;;
              twitter-scan-test) status="${{ steps.twitter-scan-test.outcome }}" ;;
            esac
            case "$status" in
              success) echo "✅ **$label** — passed" >> $GITHUB_STEP_SUMMARY ;;
              skipped) echo "⏭️ **$label** — skipped" >> $GITHUB_STEP_SUMMARY ;;
              *)       echo "❌ **$label** — failed" >> $GITHUB_STEP_SUMMARY ;;
            esac
          done

      - name: Fail if clippy or tests failed
        if: |
          steps.clippy.outcome == 'failure' ||
          steps.check-aws.outcome == 'failure' ||
          steps.cargo-test.outcome == 'failure' ||
          steps.ingestion-test.outcome == 'failure' ||
          steps.twitter-scan-test.outcome == 'failure'
        run: exit 1

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/server/static-react

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm test
        id: npm-test
        continue-on-error: true
        run: npm test

      - name: Frontend test summary
        if: always()
        run: |
          status="${{ steps.npm-test.outcome }}"
          if [ "$status" = "success" ]; then
            echo "✅ **Frontend Tests** — passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Frontend Tests** — failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if npm tests failed
        if: steps.npm-test.outcome == 'failure'
        run: exit 1

  e2e-tests:
    name: E2E UI Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/server/static-react

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E smoke tests
        id: e2e-test
        continue-on-error: true
        run: npx playwright test

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/server/static-react/test-results/
          retention-days: 7

      - name: E2E test summary
        if: always()
        run: |
          status="${{ steps.e2e-test.outcome }}"
          if [ "$status" = "success" ]; then
            echo "✅ **E2E UI Tests** — passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **E2E UI Tests** — failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if E2E tests failed
        if: steps.e2e-test.outcome == 'failure'
        run: exit 1
