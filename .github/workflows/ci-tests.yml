name: Test Suite

# Two-tier model (revised 2026-05-01 — was three-tier):
#   - Tier 1 (pull_request): every check that gates a merge — lint,
#     clippy --all-targets, lib + doc tests, frontend. ~3-4 min.
#     This is THE correctness gate.
#   - Tier 2 (merge_group): rubber-stamp admission. Only the path-filter
#     and the ci-required aggregator fire; every real workload (lint,
#     rust-fast, frontend-tests) is gated to `pull_request` and skips
#     on merge_group. Wall time ~30-60s. Branch protection still
#     requires the `ci-required` check on merge_group; it passes
#     because `if: always()` + skipped-counts-as-success makes it
#     green when all needed jobs skip.
#
# All slow workloads (clippy from clean state, doc tests, integration
# shards, face-detection, Playwright e2e, perf, AI-gated tests, FastEmbed)
# run nightly on main via nightly-integration.yml (Tier 3). Trade-off:
# regressions land on main and surface the next morning instead of being
# caught at merge time. With ~15-20 PRs/day, a nightly failure has many
# candidate culprits — git-bisect over the last day's commits to find it.
# This was a deliberate choice to keep the merge queue dragging at sub-
# minute wall time; the previous merge-queue-runs-everything model
# blocked merges for 10+ min per attempt, and a single shard failure
# tore down the whole queue and forced every queued PR to re-run CI.
on:
  pull_request:
  merge_group:

# Top-level permissions inherited by the reusable check-paths workflow
# call below. `pull-requests: read` is what `dorny/paths-filter` needs
# to walk the diff via the GitHub API on PR events.
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Path-filter once for the whole workflow. Tier 1 jobs gate on the
  # outputs so docs-only PRs skip them. The reusable workflow lives in
  # EdgeVector/.github (see check-paths.yml for category definitions).
  # `secrets: inherit` matches the org pattern set by auto-merge.yml.
  # ci-required treats `skipped` as success so docs-only PRs still
  # produce a green required check without doing real work.
  changes:
    if: github.event_name == 'pull_request'
    uses: EdgeVector/.github/.github/workflows/check-paths.yml@main
    secrets: inherit

  # ─── Tier 1 ──────────────────────────────────────────────────────
  # PR-only. Every job below gates on `github.event_name == 'pull_request'`
  # so merge_group is a pure rubber stamp (only ci-required fires there).

  lint:
    name: Lint
    needs: changes
    if: github.event_name == 'pull_request' && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends ripgrep
          fi

      - name: Run redaction lint
        run: sh scripts/lint-redaction.sh

      - name: Run spawn-instrument lint
        run: bash scripts/lint-spawn-instrument.sh

      - name: Run rev-pin format lint (cascade-relevant git deps)
        run: bash scripts/lint-rev-pin-format.sh

      - name: Run no-hardcoded-urls lint (env registry)
        run: bash scripts/lint-no-hardcoded-urls.sh

      - name: Run no-new-jsx lint (TS migration guardrail)
        run: bash scripts/lint-no-new-jsx.sh

  rust-fast:
    name: Rust Fast (PR)
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: tier1-fast

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      - name: Lint tracing egress classifiers
        run: bash scripts/lint-tracing-egress.sh

      - name: Check formatting
        run: cargo fmt --all -- --check

      # PR clippy: --all-targets. Lints test code, examples, benches —
      # this is the ONLY merge-gating clippy run (merge_group does not
      # re-run clippy as of 2026-05-01).
      - name: Run clippy (--all-targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run lib unit tests
        run: cargo nextest run --workspace --lib

      - name: Run doc tests
        run: cargo test --workspace --doc

      # OpenAPI drift check — regenerates src/types/openapi.ts from the
      # current Rust source and fails if it differs from the committed
      # file. Run `npm run generate:api` locally after backend route or
      # schema changes (run.sh dev does this automatically).
      - name: Setup Node.js (for OpenAPI drift check)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/server/static-react
        run: npm ci

      - name: Dump current OpenAPI spec
        run: cargo run --quiet --bin openapi_dump > target/openapi.json

      - name: Regenerate OpenAPI TypeScript types
        working-directory: src/server/static-react
        run: npm run generate:api

      - name: Verify openapi.ts is up to date
        run: |
          if ! git diff --exit-code src/server/static-react/src/types/openapi.ts; then
            echo "::error::src/server/static-react/src/types/openapi.ts is stale."
            echo "Run 'cargo run --bin openapi_dump > target/openapi.json && (cd src/server/static-react && npm run generate:api)' and commit the result."
            exit 1
          fi

  frontend-tests:
    name: Frontend Tests
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if frontend exists
        id: check-frontend
        run: |
          if [ -f src/server/static-react/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⏭️ **Frontend Tests** — skipped (no frontend code)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Node.js
        if: steps.check-frontend.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Install dependencies
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm run typecheck

      - name: Run npm test
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm test

  # ─── Required check ──────────────────────────────────────────────
  # Org-wide convention: every EdgeVector repo exposes `ci-required`
  # so a single uniform check name can be wired into branch protection.
  # Treats `skipped` as success — at merge_group every other job skips,
  # so this passes immediately and lets the queue land the PR.
  ci-required:
    name: ci-required
    needs: [changes, lint, rust-fast, frontend-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All required jobs must succeed
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Required job results: $RESULTS"
          for r in ${RESULTS//,/ }; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error::A required job did not succeed (result: $r)"
              exit 1
            fi
          done
          echo "All required jobs passed."
