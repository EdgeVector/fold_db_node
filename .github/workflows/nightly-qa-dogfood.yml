name: Nightly QA Dogfood Harness

# Runs the fixture-only dogfood harness (M6 from the alpha-self-dogfood plan
# in exemem-workspace/docs/plans/alpha-self-dogfood.md).
#
# Deterministic — no AI backend, no real Apple data. Exercises the 6 alpha
# ingestion surfaces (Notes, Photos, Calendar, Contacts, Reminders, local
# files) via /api/mutation + /api/query and asserts per-source round-trip.

on:
  schedule:
    # 6am UTC = 11pm PT (previous day). Offset from nightly-ingestion (4am UTC)
    # to avoid runner contention and let ingestion autofix finish first.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      per_source_count:
        description: 'Number of fixture molecules per source (default 50)'
        required: false
        default: '50'

concurrency:
  group: nightly-qa-dogfood
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  dogfood:
    name: Dogfood harness (fixtures)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_DEPS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: Swatinem/rust-cache@v2

      - name: Stub frontend dist for RustEmbed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      - name: Build binaries
        run: cargo build --bin folddb_server --bin schema_service

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run dogfood harness
        id: dogfood
        shell: bash
        run: |
          set -o pipefail
          ./scripts/qa-harness-dogfood.sh \
            --per-source-count "${{ github.event.inputs.per_source_count || '50' }}" \
            --report-dir "$GITHUB_WORKSPACE/dogfood-report" \
            2>&1 | tee /tmp/dogfood-output.txt

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-dogfood-report
          path: |
            dogfood-report/
            /tmp/dogfood-output.txt
          retention-days: 14

      # On nightly-schedule failure, funnel the regression into a single
      # persistent GitHub issue rather than spamming one-shot issues per
      # failure. If the issue already exists and is open, append a comment.
      # If closed, reopen + comment. Manual workflow_dispatch runs do NOT
      # trigger this step, so ad-hoc experiments don't pollute the tracker.
      - name: File or update regression tracker issue
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT_FILE: dogfood-report/report.md
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRACKER_TITLE: 'Nightly QA dogfood regression tracker'
        shell: bash
        run: |
          set -euo pipefail
          failing=""
          if [ -f "$REPORT_FILE" ]; then
            # report.md rows look like: | notes | FAIL | <detail> |
            failing="$(awk -F'|' '/\| FAIL \|/ {gsub(/^ *| *$/,"",$2); printf "%s ", $2}' "$REPORT_FILE" | sed 's/ *$//')"
          fi
          # org-leg / set-org-hash-leg FAIL (not PENDING — PENDING is expected
          # while M1 deploy is out). Both sub-sections use the same
          # "- **Status:** FAIL" marker, so awk-scan each section separately.
          if [ -f "$REPORT_FILE" ]; then
            if awk '/^## Set-org-hash leg/,/^## Org-sync leg/' "$REPORT_FILE" \
              | grep -q '^\- \*\*Status:\*\* FAIL'; then
              failing="${failing:+$failing }set-org-hash-leg"
            fi
            if awk '/^## Org-sync leg/,0' "$REPORT_FILE" \
              | grep -q '^\- \*\*Status:\*\* FAIL'; then
              failing="${failing:+$failing }org-leg"
            fi
          fi
          [ -z "$failing" ] && failing="unknown (see harness.log)"

          {
            echo "### Nightly dogfood harness failed"
            echo ""
            echo "- **Run:** $RUN_URL"
            echo "- **Date (UTC):** $(date -u '+%Y-%m-%d %H:%M')"
            echo "- **Failing:** $failing"
            echo ""
            echo "See the \`qa-dogfood-report\` artifact on the run for the full"
            echo "report, per-call JSON responses, and \`harness.log\`."
            echo ""
            if [ -f "$REPORT_FILE" ]; then
              echo "<details><summary>report.md</summary>"
              echo ""
              echo '```markdown'
              cat "$REPORT_FILE"
              echo '```'
              echo ""
              echo "</details>"
            fi
          } > /tmp/issue-comment.md

          # Find an existing tracker by exact title
          existing="$(gh issue list \
              --repo "${{ github.repository }}" \
              --state all \
              --search "in:title \"$TRACKER_TITLE\"" \
              --json number,title,state \
              --limit 20 \
            | jq -r --arg t "$TRACKER_TITLE" '.[] | select(.title == $t) | "\(.number) \(.state)"' \
            | head -1)"

          if [ -n "$existing" ]; then
            num="${existing%% *}"
            state="${existing##* }"
            echo "Tracker issue #$num state=$state — appending comment."
            gh issue comment "$num" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/issue-comment.md
            if [ "$state" = "CLOSED" ]; then
              gh issue reopen "$num" --repo "${{ github.repository }}"
            fi
          else
            echo "No tracker issue yet — creating one."
            # Ensure labels exist (idempotent; first nightly failure in a fresh
            # repo would otherwise fail because labels are not pre-provisioned).
            for label_spec in \
              'nightly-qa:ededed:Regression surfaced by a nightly QA workflow' \
              'dogfood-regression:b60205:Alpha dogfood harness found a broken source' \
              'alpha-m6:5319e7:Tracks work under alpha-self-dogfood §4 M6' ; do
              name="${label_spec%%:*}"; rest="${label_spec#*:}"
              color="${rest%%:*}"; desc="${rest#*:}"
              gh label create "$name" \
                --repo "${{ github.repository }}" \
                --color "$color" \
                --description "$desc" \
                --force 2>/dev/null || true
            done
            {
              echo "This issue is auto-managed by \`.github/workflows/nightly-qa-dogfood.yml\`."
              echo "It is re-opened and re-commented every time the nightly dogfood"
              echo "harness fails. Close it once the regression is fixed; the workflow"
              echo "will re-open it on the next failure."
              echo ""
              cat /tmp/issue-comment.md
            } > /tmp/issue-body.md
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "$TRACKER_TITLE" \
              --body-file /tmp/issue-body.md \
              --label "nightly-qa" \
              --label "dogfood-regression" \
              --label "alpha-m6"
          fi
