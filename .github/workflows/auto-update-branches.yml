name: Auto-update PR branches

on:
  push:
    branches: [main]
  pull_request:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-branches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update all open PR branches
        run: |
          prs=$(gh pr list --base main --state open --json number --jq '.[].number')
          if [ -z "$prs" ]; then
            echo "No open PRs to update."
            exit 0
          fi
          for pr in $prs; do
            echo "Updating PR #$pr..."
            gh api repos/${{ github.repository }}/pulls/$pr/update-branch \
              -X PUT \
              2>&1 && echo "  Updated." || echo "  Skipped (already up to date or conflict)"
          done
        env:
          # Must use a PAT (not github.token) so that the resulting push
          # triggers the pull_request: synchronize event and CI re-runs on
          # the updated HEAD. Without that, auto-merge stalls waiting for
          # checks that will never trigger. The PAT needs Contents: rw and
          # Pull requests: rw on this repo; store it as the GH_PAT secret.
          GH_TOKEN: ${{ secrets.GH_PAT }}
