name: Weekly Release

on:
  schedule:
    # Every Sunday at 6am UTC (Saturday 11pm PT)
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes since last release
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            CHANGES=$(git log "$LAST_TAG"..HEAD --oneline | wc -l)
            if [ "$CHANGES" -gt 0 ]; then
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Compute next version
        id: version
        if: steps.check.outputs.has_changes == 'true'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEW_VERSION"

  open-release-pr:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Direct pushes to main are blocked by the repo's merge-queue ruleset
      # ("Changes must be made through the merge queue"). Push the bump on a
      # release branch and open a PR — the existing auto-merge.yml workflow
      # picks it up and `gh pr merge --auto` (no strategy flag) lets the
      # queue squash-merge it. The tag step lives in the companion
      # weekly-release-tag.yml workflow, which fires on the merged commit.
      - name: Bump version on release branch + open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-changes.outputs.new_version }}"
          BRANCH="release/v$VERSION"

          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          git checkout -b "$BRANCH"
          git add Cargo.toml
          git commit -m "chore: bump version to $VERSION for weekly release"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create --base main --head "$BRANCH" \
            --title "chore: bump version to v$VERSION for weekly release" \
            --body "Automated weekly release. Once this merges, \`weekly-release-tag.yml\` fires on the merged commit and pushes \`v$VERSION\`.")
          echo "Opened $PR_URL"

          # No --squash flag: the repo's merge-queue ruleset enforces SQUASH
          # itself, and gh refuses inconsistent strategy hints (auto-merge.yml
          # has a load-bearing comment about this).
          gh pr merge --auto "$PR_URL"
