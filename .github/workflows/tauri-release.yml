name: Tauri Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            arch: aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_DEPS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: tauri-${{ matrix.target }}

      # --- Apple certificate setup ---
      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain for CI
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the .p12 certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the keychain without UI prompt
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to keychain search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Verify identity is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          rm "$CERT_PATH"

      # --- Build frontend + Tauri app ---
      - name: Install frontend dependencies
        working-directory: src/server/static-react
        run: npm ci

      - name: Build frontend
        working-directory: src/server/static-react
        run: npm run build

      - name: Build Tauri app
        working-directory: src/server/static-react
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npx tauri build --target ${{ matrix.target }}

      # --- Verify signing ---
      - name: Verify code signature
        run: |
          APP_PATH="src/server/static-react/src-tauri/target/${{ matrix.target }}/release/bundle/macos/FoldDB.app"
          echo "Verifying: $APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      # --- Notarize ---
      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BUNDLE_DIR="src/server/static-react/src-tauri/target/${{ matrix.target }}/release/bundle"
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)

          if [[ -z "$DMG" ]]; then
            echo "No DMG found, skipping notarization"
            exit 0
          fi

          echo "Notarizing: $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG"

      # --- Upload ---
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoldDB-${{ matrix.arch }}-apple-darwin.dmg
          path: src/server/static-react/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      # --- Cleanup keychain ---
      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [[ -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

  # Attach DMGs to the GitHub Release (only on tag push)
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.dmg
