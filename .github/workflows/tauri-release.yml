name: Tauri Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            arch: aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_DEPS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: tauri-${{ matrix.target }}

      # --- Apple certificate setup ---
      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain for CI
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the .p12 certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the keychain without UI prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to keychain search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Verify identity is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          rm "$CERT_PATH"

      # --- Build frontend + Tauri app ---
      - name: Install frontend dependencies
        working-directory: src/server/static-react
        run: npm ci

      - name: Build frontend
        working-directory: src/server/static-react
        run: npm run build

      - name: Build folddb_mcp sidecar
        run: |
          cargo build --release --bin folddb_mcp --target ${{ matrix.target }}
          mkdir -p src/server/static-react/src-tauri/binaries
          cp target/${{ matrix.target }}/release/folddb_mcp \
            src/server/static-react/src-tauri/binaries/folddb_mcp-${{ matrix.target }}

      - name: Build Tauri app
        working-directory: src/server/static-react
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }} --bundles app,dmg

      # --- Verify signing ---
      - name: Verify code signature
        run: |
          APP_PATH="src/server/static-react/src-tauri/target/${{ matrix.target }}/release/bundle/macos/FoldDB.app"
          if [[ -d "$APP_PATH" ]]; then
            echo "Verifying: $APP_PATH"
            codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          else
            echo "Standalone .app not found at $APP_PATH, verifying DMG signature instead"
            BUNDLE_DIR="src/server/static-react/src-tauri/target/${{ matrix.target }}/release/bundle"
            DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
            if [[ -n "$DMG" ]]; then
              codesign --verify --verbose=2 "$DMG"
            fi
          fi

      # --- Notarize ---
      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BUNDLE_DIR="src/server/static-react/src-tauri/target/${{ matrix.target }}/release/bundle"
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)

          if [[ -z "$DMG" ]]; then
            echo "No DMG found, skipping notarization"
            exit 0
          fi

          echo "Notarizing: $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG"

      # --- Verify notarization ---
      - name: Verify notarization
        run: |
          BUNDLE_DIR="src/server/static-react/src-tauri/target/${{ matrix.target }}/release/bundle"
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
          if [[ -n "$DMG" ]]; then
            echo "Checking Gatekeeper assessment..."
            spctl --assess --type open --context context:primary-signature -vvv "$DMG" 2>&1 || true
            echo ""
            echo "Validating stapled ticket..."
            stapler validate "$DMG"
          fi

      # --- Rename with version + arch ---
      - name: Prepare artifact
        id: artifact
        run: |
          BUNDLE_DIR="src/server/static-react/src-tauri/target/${{ matrix.target }}/release/bundle"
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
          VERSION=$(jq -r '.version' src/server/static-react/src-tauri/tauri.conf.json)
          FINAL_NAME="FoldDB_${VERSION}_${{ matrix.arch }}.dmg"
          cp "$DMG" "$RUNNER_TEMP/$FINAL_NAME"
          echo "dmg_path=$RUNNER_TEMP/$FINAL_NAME" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$FINAL_NAME" >> "$GITHUB_OUTPUT"

      # --- Upload ---
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.dmg_name }}
          path: ${{ steps.artifact.outputs.dmg_path }}
          if-no-files-found: error

      # --- Cleanup keychain ---
      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [[ -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

  # Smoke-test the signed+notarized DMG actually launches and reports the right version.
  # Catches binary drift, bundle-version drift, and broken builds before they reach users.
  dmg-smoke:
    needs: build-macos
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          pattern: FoldDB_*_aarch64.dmg
          path: ${{ runner.temp }}/dmg
          merge-multiple: true

      - name: Resolve DMG and expected version
        id: find
        run: |
          DMG=$(ls "$RUNNER_TEMP/dmg"/*.dmg | head -1)
          if [[ -z "$DMG" ]]; then
            echo "::error::No DMG artifact found"
            exit 1
          fi
          # Filename is FoldDB_<version>_aarch64.dmg
          FILENAME=$(basename "$DMG")
          VERSION="${FILENAME#FoldDB_}"
          VERSION="${VERSION%_aarch64.dmg}"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "expected_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Testing DMG: $DMG (expected version: $VERSION)"

      - name: Mount DMG
        id: mount
        run: |
          MOUNT_POINT=$(hdiutil attach "${{ steps.find.outputs.dmg }}" -nobrowse -readonly | tail -1 | awk '{print $NF}')
          echo "mount_point=$MOUNT_POINT" >> "$GITHUB_OUTPUT"
          echo "Mounted at: $MOUNT_POINT"
          ls -la "$MOUNT_POINT"

      - name: Copy .app and verify Info.plist version
        run: |
          cp -R "${{ steps.mount.outputs.mount_point }}/FoldDB.app" "$RUNNER_TEMP/FoldDB.app"
          INFO="$RUNNER_TEMP/FoldDB.app/Contents/Info.plist"
          BUNDLE_VERSION=$(plutil -extract CFBundleShortVersionString raw "$INFO")
          # Tauri 2.x names the executable inside Contents/MacOS/ after the
          # Cargo crate (`fold-app`), not after `productName`. Read the
          # canonical executable name from Info.plist's CFBundleExecutable
          # so the smoke test stays correct if either name changes.
          BUNDLE_EXEC=$(plutil -extract CFBundleExecutable raw "$INFO")
          EXPECTED="${{ steps.find.outputs.expected_version }}"
          echo "Info.plist CFBundleShortVersionString: $BUNDLE_VERSION"
          echo "Info.plist CFBundleExecutable:         $BUNDLE_EXEC"
          echo "Expected:                              $EXPECTED"
          if [[ "$BUNDLE_VERSION" != "$EXPECTED" ]]; then
            echo "::error::Bundle version drift — Info.plist says $BUNDLE_VERSION but artifact is $EXPECTED"
            exit 1
          fi
          echo "BUNDLE_EXEC=$BUNDLE_EXEC" >> "$GITHUB_ENV"

      - name: Launch app and probe /api/health
        env:
          EXPECTED_VERSION: ${{ steps.find.outputs.expected_version }}
        run: |
          BIN="$RUNNER_TEMP/FoldDB.app/Contents/MacOS/$BUNDLE_EXEC"
          "$BIN" > "$RUNNER_TEMP/app.log" 2>&1 &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> "$GITHUB_ENV"
          echo "Launched $BIN (pid $APP_PID)"

          # Wait up to 45s for /api/health to come up
          for i in $(seq 1 45); do
            if curl -sSf http://localhost:9001/api/health >/dev/null 2>&1; then
              echo "Health endpoint up after ${i}s"
              break
            fi
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "::error::App process exited before /api/health came up"
              cat "$RUNNER_TEMP/app.log"
              exit 1
            fi
            sleep 1
          done

          HEALTH=$(curl -sSf http://localhost:9001/api/health)
          echo "Health response: $HEALTH"
          ACTUAL=$(echo "$HEALTH" | jq -r '.version')

          if [[ "$ACTUAL" != "$EXPECTED_VERSION" ]]; then
            echo "::error::Binary version drift — /api/health says '$ACTUAL' but DMG is '$EXPECTED_VERSION'"
            echo "=== app.log ==="
            cat "$RUNNER_TEMP/app.log"
            exit 1
          fi

          echo "DMG smoke passed: binary version $ACTUAL matches artifact $EXPECTED_VERSION"

      - name: Dump app log on failure
        if: failure()
        run: cat "$RUNNER_TEMP/app.log" || true

      - name: Teardown
        if: always()
        run: |
          if [[ -n "$APP_PID" ]]; then
            kill "$APP_PID" 2>/dev/null || true
          fi
          if [[ -n "${{ steps.mount.outputs.mount_point }}" ]]; then
            hdiutil detach "${{ steps.mount.outputs.mount_point }}" -force || true
          fi

  # Attach DMGs to the GitHub Release (only on tag push)
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, dmg-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect DMGs and generate checksums
        run: |
          mkdir -p release
          find artifacts -type f -name '*.dmg' -exec cp {} release/ \;
          cd release
          shasum -a 256 *.dmg > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.dmg
            release/SHA256SUMS.txt
