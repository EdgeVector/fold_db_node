# How to release: see docs/RELEASING.md
#
# Same trigger model as release.yml:
# - `push: tags v*` — real release. Builds, signs, notarizes, attaches DMG.
# - `workflow_dispatch` — dry-run. Builds + signs + DMG smoke against any
#   ref. Skips notarization (Apple notary rate limits / 5-10 min wait) and
#   skips the release attach.
# - `schedule: weekly Sunday 06:00 UTC` — smoke. Same as dispatch, against
#   `main`. Catches drift in the Tauri build (e.g. when Tauri 2.x changed
#   the bundle binary name from `FoldDB` to `fold-app`, the existing
#   smoke at v0.3.12 silently broke between releases).
#
# The version stamped into Cargo's `FOLDDB_BUILD_VERSION` and into Tauri's
# `tauri.conf.json` is derived from the tag (or "0.0.0-dev" for non-tag
# triggers). No need to maintain `version` in source files anymore — the
# tag is the source of truth.
name: Tauri Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref to build (commit/branch/tag). Defaults to the workflow ref.'
        required: false
        type: string
  schedule:
    - cron: '0 6 * * 0'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon — native build on macos-14 (ARM) runner.
          - target: aarch64-apple-darwin
            os: macos-14
            arch: aarch64
          # Intel Macs — cross-compiled from the macos-14 (ARM) runner.
          # Same approach release.yml takes for the Intel-Mac tarball.
          # macos-13 x86 runners are queue-starved and slated for
          # deprecation; macos-14 has both toolchains available via
          # `rustup target add x86_64-apple-darwin` (handled by
          # dtolnay/rust-toolchain). The dmg-smoke job only runs
          # against aarch64 (host arch) — x86_64 ships untested by the
          # smoke loop, but builds, signs, and notarizes the same way.
          - target: x86_64-apple-darwin
            os: macos-14
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      # Tag-push: VERSION = tag name with `v` stripped.
      # Anything else (dispatch / schedule): VERSION = "0.0.0-dev".
      # FOLDDB_BUILD_VERSION_OVERRIDE pins the runtime-stamped version (see
      # build.rs) so /api/health matches the bundle's CFBundleShortVersionString
      # — otherwise build.rs falls back to `git describe` and dmg-smoke
      # mismatches the artifact name.
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "FOLDDB_BUILD_VERSION_OVERRIDE=$VERSION" >> "$GITHUB_ENV"
          echo "Resolved release version: $VERSION"

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: tauri-${{ matrix.target }}

      # --- Apple certificate setup ---
      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain for CI
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the .p12 certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the keychain without UI prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to keychain search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Verify identity is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          rm "$CERT_PATH"

      # --- Build frontend + Tauri app ---
      - name: Install frontend dependencies
        working-directory: src/server/static-react
        run: npm ci

      - name: Build frontend
        working-directory: src/server/static-react
        run: npm run build

      - name: Build folddb_mcp sidecar
        run: |
          cargo build --release --bin folddb_mcp --target ${{ matrix.target }}
          mkdir -p src/server/static-react/src-tauri/binaries
          cp target/${{ matrix.target }}/release/folddb_mcp \
            src/server/static-react/src-tauri/binaries/folddb_mcp-${{ matrix.target }}

      # --config '{"version":"X.Y.Z"}' overrides tauri.conf.json's version
      # at build time. The DMG name (FoldDB_${VERSION}_${arch}.dmg) and
      # Info.plist's CFBundleShortVersionString both flow from this — so
      # the tag is the single source of truth for the bundle version.
      # No need to keep tauri.conf.json's `version` in sync with releases.
      - name: Build Tauri app
        working-directory: src/server/static-react
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npx tauri build \
            --target ${{ matrix.target }} \
            --config "{\"version\":\"${{ steps.version.outputs.version }}\"}" \
            --bundles app,dmg

      # --- Verify signing ---
      - name: Verify code signature
        run: |
          APP_PATH="src/server/static-react/src-tauri/target/${{ matrix.target }}/release/bundle/macos/FoldDB.app"
          if [[ -d "$APP_PATH" ]]; then
            echo "Verifying: $APP_PATH"
            codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          else
            echo "Standalone .app not found at $APP_PATH, verifying DMG signature instead"
            BUNDLE_DIR="src/server/static-react/src-tauri/target/${{ matrix.target }}/release/bundle"
            DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
            if [[ -n "$DMG" ]]; then
              codesign --verify --verbose=2 "$DMG"
            fi
          fi

      # Tag-push only — Apple notary has rate limits and adds 5-10 min.
      # Smoke / dispatch builds skip this; signed-but-unnotarized DMG is
      # enough for the smoke test to verify everything else.
      - name: Notarize app
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BUNDLE_DIR="src/server/static-react/src-tauri/target/${{ matrix.target }}/release/bundle"
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)

          if [[ -z "$DMG" ]]; then
            echo "No DMG found, skipping notarization"
            exit 0
          fi

          echo "Notarizing: $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG"

      - name: Verify notarization
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          BUNDLE_DIR="src/server/static-react/src-tauri/target/${{ matrix.target }}/release/bundle"
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
          if [[ -n "$DMG" ]]; then
            echo "Checking Gatekeeper assessment..."
            spctl --assess --type open --context context:primary-signature -vvv "$DMG" 2>&1 || true
            echo ""
            echo "Validating stapled ticket..."
            stapler validate "$DMG"
          fi

      # --- Rename with version + arch ---
      # `tauri build --bundles app,dmg` produces THREE artifacts per arch:
      #   - bundle/dmg/<original>.dmg     (drag-install for end users)
      #   - bundle/macos/FoldDB.app.tar.gz     (compressed .app — what
      #     tauri-plugin-updater fetches for in-app upgrades)
      #   - bundle/macos/FoldDB.app.tar.gz.sig (minisign signature of
      #     the tarball — embedded into latest.json for integrity check)
      #
      # All three need to ship with arch-suffixed names so the release
      # job can pick them up alongside their siblings from the other
      # matrix arch and assemble a multi-platform `latest.json`.
      - name: Prepare artifact
        id: artifact
        run: |
          BUNDLE_DIR="src/server/static-react/src-tauri/target/${{ matrix.target }}/release/bundle"
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
          APP_TAR=$(find "$BUNDLE_DIR/macos" -name "*.app.tar.gz" | head -1)
          APP_SIG=$(find "$BUNDLE_DIR/macos" -name "*.app.tar.gz.sig" | head -1)
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"

          DMG_NAME="FoldDB_${VERSION}_${ARCH}.dmg"
          TAR_NAME="FoldDB_${VERSION}_${ARCH}.app.tar.gz"
          SIG_NAME="FoldDB_${VERSION}_${ARCH}.app.tar.gz.sig"

          mkdir -p "$RUNNER_TEMP/bundle"
          cp "$DMG" "$RUNNER_TEMP/bundle/$DMG_NAME"
          if [[ -n "$APP_TAR" && -f "$APP_TAR" ]]; then
            cp "$APP_TAR" "$RUNNER_TEMP/bundle/$TAR_NAME"
          else
            echo "::warning::No .app.tar.gz produced — updater bundle missing for $ARCH; latest.json will skip this platform."
          fi
          if [[ -n "$APP_SIG" && -f "$APP_SIG" ]]; then
            cp "$APP_SIG" "$RUNNER_TEMP/bundle/$SIG_NAME"
          else
            echo "::warning::No .app.tar.gz.sig produced — updater signature missing for $ARCH."
          fi

          # dmg-smoke pattern is `FoldDB_*_aarch64.dmg`; keep
          # exposing the DMG path/name as outputs for that.
          echo "dmg_path=$RUNNER_TEMP/bundle/$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "bundle_dir=$RUNNER_TEMP/bundle" >> "$GITHUB_OUTPUT"

      # --- Upload ---
      - name: Upload DMG artifact (for dmg-smoke + release attach)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.dmg_name }}
          path: ${{ steps.artifact.outputs.dmg_path }}
          if-no-files-found: error

      # Updater bundle (.app.tar.gz + .sig) — needed by the `release`
      # job to assemble latest.json. Separate artifact name keyed by arch
      # so both matrix runs upload to distinct slots.
      - name: Upload updater bundle (.app.tar.gz + .sig)
        uses: actions/upload-artifact@v4
        with:
          name: updater-bundle-${{ matrix.arch }}
          path: |
            ${{ steps.artifact.outputs.bundle_dir }}/*.app.tar.gz
            ${{ steps.artifact.outputs.bundle_dir }}/*.app.tar.gz.sig
          if-no-files-found: warn

      # --- Cleanup keychain ---
      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [[ -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

  # Smoke-test the signed DMG actually launches and reports the right version.
  # Catches binary drift, bundle-version drift, and broken builds before they
  # reach users. Runs on tag-push, dispatch, and schedule — so weekly smoke
  # catches Tauri/bundle drift even when nobody's tagging.
  dmg-smoke:
    needs: build-macos
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          pattern: FoldDB_*_aarch64.dmg
          path: ${{ runner.temp }}/dmg
          merge-multiple: true

      - name: Resolve DMG and expected version
        id: find
        run: |
          DMG=$(ls "$RUNNER_TEMP/dmg"/*.dmg | head -1)
          if [[ -z "$DMG" ]]; then
            echo "::error::No DMG artifact found"
            exit 1
          fi
          # Filename is FoldDB_<version>_aarch64.dmg
          FILENAME=$(basename "$DMG")
          VERSION="${FILENAME#FoldDB_}"
          VERSION="${VERSION%_aarch64.dmg}"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "expected_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Testing DMG: $DMG (expected version: $VERSION)"

      - name: Mount DMG
        id: mount
        run: |
          MOUNT_POINT=$(hdiutil attach "${{ steps.find.outputs.dmg }}" -nobrowse -readonly | tail -1 | awk '{print $NF}')
          echo "mount_point=$MOUNT_POINT" >> "$GITHUB_OUTPUT"
          echo "Mounted at: $MOUNT_POINT"
          ls -la "$MOUNT_POINT"

      - name: Copy .app and verify Info.plist version
        run: |
          cp -R "${{ steps.mount.outputs.mount_point }}/FoldDB.app" "$RUNNER_TEMP/FoldDB.app"
          INFO="$RUNNER_TEMP/FoldDB.app/Contents/Info.plist"
          BUNDLE_VERSION=$(plutil -extract CFBundleShortVersionString raw "$INFO")
          # Tauri 2.x names the executable inside Contents/MacOS/ after the
          # Cargo crate (`fold-app`), not after `productName`. Read the
          # canonical executable name from Info.plist's CFBundleExecutable
          # so the smoke test stays correct if either name changes.
          BUNDLE_EXEC=$(plutil -extract CFBundleExecutable raw "$INFO")
          EXPECTED="${{ steps.find.outputs.expected_version }}"
          echo "Info.plist CFBundleShortVersionString: $BUNDLE_VERSION"
          echo "Info.plist CFBundleExecutable:         $BUNDLE_EXEC"
          echo "Expected:                              $EXPECTED"
          if [[ "$BUNDLE_VERSION" != "$EXPECTED" ]]; then
            echo "::error::Bundle version drift — Info.plist says $BUNDLE_VERSION but artifact is $EXPECTED"
            exit 1
          fi
          echo "BUNDLE_EXEC=$BUNDLE_EXEC" >> "$GITHUB_ENV"

      - name: Launch app and probe /api/health
        env:
          EXPECTED_VERSION: ${{ steps.find.outputs.expected_version }}
        run: |
          BIN="$RUNNER_TEMP/FoldDB.app/Contents/MacOS/$BUNDLE_EXEC"
          "$BIN" > "$RUNNER_TEMP/app.log" 2>&1 &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> "$GITHUB_ENV"
          echo "Launched $BIN (pid $APP_PID)"

          # Wait up to 45s for /api/health to come up
          for i in $(seq 1 45); do
            if curl -sSf http://localhost:9001/api/health >/dev/null 2>&1; then
              echo "Health endpoint up after ${i}s"
              break
            fi
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "::error::App process exited before /api/health came up"
              cat "$RUNNER_TEMP/app.log"
              exit 1
            fi
            sleep 1
          done

          HEALTH=$(curl -sSf http://localhost:9001/api/health)
          echo "Health response: $HEALTH"
          ACTUAL=$(echo "$HEALTH" | jq -r '.version')

          if [[ "$ACTUAL" != "$EXPECTED_VERSION" ]]; then
            echo "::error::Binary version drift — /api/health says '$ACTUAL' but DMG is '$EXPECTED_VERSION'"
            echo "=== app.log ==="
            cat "$RUNNER_TEMP/app.log"
            exit 1
          fi

          echo "Backend health passed: binary version $ACTUAL matches artifact $EXPECTED_VERSION"

          # The webview loads `GET /` from the embedded server. If the
          # binary was built before the React `dist/` was populated,
          # build.rs writes a stub index.html as a compile-time
          # fallback (RustEmbed needs the directory to exist). A
          # release that ships the stub still passes /api/health, but
          # opens to a blank window. Catch that here: real React shell
          # has a `<script type="module">` tag; the stub does not.
          INDEX_HTML=$(curl -sSf "http://localhost:9001/")
          if ! echo "$INDEX_HTML" | grep -q '<script type="module"'; then
            echo "::error::GET / did not return the real React shell (no module script tag found). The bundle may have embedded build.rs's stub instead of a real `npm run build` output. First 400 bytes:"
            echo "$INDEX_HTML" | head -c 400
            echo
            exit 1
          fi
          # And actually fetch the JS bundle the shell references — confirms
          # static_assets embedding is wired through end-to-end, not just
          # serving the index.
          JS_REL=$(echo "$INDEX_HTML" | sed -nE 's/.*src="\.\/(assets\/[^"]+\.js)".*/\1/p' | head -1)
          if [[ -z "$JS_REL" ]]; then
            echo "::error::Could not extract JS asset path from index.html"
            exit 1
          fi
          JS_STATUS=$(curl -sS -o /dev/null -w '%{http_code}' "http://localhost:9001/$JS_REL")
          if [[ "$JS_STATUS" != "200" ]]; then
            echo "::error::Webview JS bundle GET /$JS_REL returned $JS_STATUS (expected 200). Backend serves index but not assets — RustEmbed hash mismatch?"
            exit 1
          fi
          echo "Webview shell + JS bundle both load: / → React HTML, /$JS_REL → 200 OK"
          echo "DMG smoke passed end-to-end (backend health + webview-shell-loadable)."

      - name: Dump app log on failure
        if: failure()
        run: cat "$RUNNER_TEMP/app.log" || true

      - name: Teardown
        if: always()
        run: |
          if [[ -n "$APP_PID" ]]; then
            kill "$APP_PID" 2>/dev/null || true
          fi
          if [[ -n "${{ steps.mount.outputs.mount_point }}" ]]; then
            hdiutil detach "${{ steps.mount.outputs.mount_point }}" -force || true
          fi

  # Attach DMGs + updater bundle (.app.tar.gz + .sig per arch) +
  # latest.json to the GitHub Release (only on tag push). The
  # tauri-plugin-updater inside the running app fetches latest.json from
  # the latest release at runtime and uses it to drive in-app upgrades.
  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, dmg-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets and generate checksums
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \
            \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \) \
            -exec cp {} release/ \;
          cd release
          ls -la
          # Hash both the drag-install DMGs and the updater tarballs so
          # downstream consumers (Homebrew, install.sh, integrity audits)
          # can verify either form. Sigs aren't hashed — they're
          # signatures of the tarballs.
          shasum -a 256 *.dmg *.app.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # Build latest.json — the manifest tauri-plugin-updater fetches at
      # https://github.com/EdgeVector/fold_db_node/releases/latest/download/latest.json
      # (configured in tauri.conf.json's plugins.updater.endpoints).
      # Format per Tauri 2 docs: top-level version + notes + pub_date,
      # per-platform { signature, url }. Signature is the *contents* of
      # the .app.tar.gz.sig file (a base64 minisign signature) embedded
      # inline. URL points at the .app.tar.gz hosted on this release.
      - name: Generate latest.json for in-app updater
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${VERSION_TAG#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BASE_URL="https://github.com/EdgeVector/fold_db_node/releases/download/${VERSION_TAG}"
          NOTES="See ${BASE_URL%/download/*}/tag/${VERSION_TAG}"

          AARCH64_SIG_FILE="release/FoldDB_${VERSION}_aarch64.app.tar.gz.sig"
          X86_64_SIG_FILE="release/FoldDB_${VERSION}_x86_64.app.tar.gz.sig"

          # Build per-platform JSON entries only if the .sig file
          # actually exists (i.e. that arch's matrix run produced an
          # updater bundle). Missing arch is a warning, not a failure
          # — better to ship a partial latest.json than to block the
          # release on it.
          PLATFORMS_JSON=""
          add_platform() {
            local key="$1"
            local sig_file="$2"
            local tarball_name="$3"
            if [[ -f "$sig_file" ]]; then
              local sig
              sig="$(cat "$sig_file")"
              local entry
              entry=$(jq -nc \
                --arg sig "$sig" \
                --arg url "${BASE_URL}/${tarball_name}" \
                '{signature: $sig, url: $url}')
              if [[ -z "$PLATFORMS_JSON" ]]; then
                PLATFORMS_JSON="\"${key}\": ${entry}"
              else
                PLATFORMS_JSON="${PLATFORMS_JSON}, \"${key}\": ${entry}"
              fi
            else
              echo "::warning::Updater bundle for ${key} missing (no ${sig_file}); skipping in latest.json"
            fi
          }

          add_platform "darwin-aarch64" "$AARCH64_SIG_FILE" "FoldDB_${VERSION}_aarch64.app.tar.gz"
          add_platform "darwin-x86_64"  "$X86_64_SIG_FILE"  "FoldDB_${VERSION}_x86_64.app.tar.gz"

          if [[ -z "$PLATFORMS_JSON" ]]; then
            echo "::error::No platform-specific updater bundles found; latest.json would be empty. Failing rather than shipping a broken updater manifest."
            exit 1
          fi

          jq -n \
            --arg v "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub "$PUB_DATE" \
            --argjson platforms "{ ${PLATFORMS_JSON} }" \
            '{version: $v, notes: $notes, pub_date: $pub, platforms: $platforms}' \
            > release/latest.json

          echo "--- latest.json ---"
          cat release/latest.json

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.app.tar.gz
            release/*.app.tar.gz.sig
            release/SHA256SUMS.txt
            release/latest.json
