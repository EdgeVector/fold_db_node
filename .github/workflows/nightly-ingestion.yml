name: Nightly Ingestion Test

on:
  schedule:
    # 4am UTC = 9pm PT (previous day)
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      provider:
        description: 'AI Provider (Anthropic or Ollama)'
        required: false
        default: 'Anthropic'

concurrency:
  group: nightly-ingestion
  cancel-in-progress: true

jobs:
  ingestion-test:
    name: Sample Data Ingestion
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout fold_db_node
        uses: actions/checkout@v4
        with:
          path: fold_db_node

      # Phase 0 T3: schema_service lives in its own repo now. Check it out as
      # a sibling so ../schema_service resolves the way it does in the
      # workspace checkout that developers use locally.
      - name: Checkout schema_service (sibling)
        uses: actions/checkout@v4
        with:
          repository: EdgeVector/schema_service
          ref: main
          token: ${{ secrets.GH_PAT }}
          path: schema_service

      # Both repos ship a .cargo/config.toml that patches their git deps
      # to sibling path checkouts for local dev. CI pins via lockfiles
      # instead, so strip both — schema_service's patches fold_db to
      # `../fold_db` (absent), and fold_db_node's patches schema_service
      # to `../schema_service` (present, but we want the Cargo.lock pin
      # to win so PR CI stays stable across schema_service main drift).
      - name: Remove local-dev cargo patches
        run: |
          rm -f schema_service/.cargo/config.toml
          rm -f fold_db_node/.cargo/config.toml

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            fold_db_node
            schema_service

      - name: Stub frontend dist for RustEmbed
        working-directory: fold_db_node
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      - name: Build folddb_server
        working-directory: fold_db_node
        run: cargo build --bin folddb_server

      - name: Build schema_service (submodule)
        working-directory: schema_service
        run: cargo build -p schema_service_server_http --bin schema_service

      - name: Run ingestion test
        id: ingestion
        working-directory: fold_db_node
        shell: bash
        run: |
          set -o pipefail
          ./scripts/test-sample-ingestion.sh \
            --provider "${{ github.event.inputs.provider || 'Anthropic' }}" \
            --max-wait 30 2>&1 | tee /tmp/ingestion-output.txt

      - name: Save failure context
        if: failure()
        run: |
          {
            echo "## Test Output"
            echo '```'
            cat /tmp/ingestion-output.txt 2>/dev/null || echo "No output"
            echo '```'
            echo ""
            echo "## Server Log (last 100 lines)"
            echo '```'
            tail -100 /tmp/tmp.*/server.log 2>/dev/null || echo "No server log"
            echo '```'
            echo ""
            echo "## Schema Service Log (last 50 lines)"
            echo '```'
            tail -50 /tmp/tmp.*/schema_service.log 2>/dev/null || echo "No schema log"
            echo '```'
          } > /tmp/failure-context.txt

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-test-logs
          path: |
            /tmp/ingestion-output.txt
            /tmp/failure-context.txt
            /tmp/tmp.*/server.log
            /tmp/tmp.*/schema_service.log
          retention-days: 7

  auto-fix:
    name: Claude Code Auto-Fix
    needs: ingestion-test
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download failure logs
        uses: actions/download-artifact@v4
        with:
          name: ingestion-test-logs
          path: /tmp/failure-logs

      - name: Prepare failure context
        run: |
          {
            echo "The nightly sample data ingestion test failed."
            echo ""
            cat /tmp/failure-logs/failure-context.txt 2>/dev/null || echo "No context file"
          } > /tmp/claude-prompt-context.txt

      - name: Run Claude Code to fix
        uses: anthropics/claude-code-action@beta
        with:
          mode: agent
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            The nightly ingestion integration test failed. This test runs
            scripts/test-sample-ingestion.sh which starts a FoldDB node,
            smart-folder-ingests all files in sample_data/, and asserts
            100% success.

            Read the failure context below, diagnose the root cause, fix it,
            and create a PR. The fix should be in the Rust code, not in the
            test script (unless the script has a bug).

            Key files:
            - scripts/test-sample-ingestion.sh (the test)
            - src/ingestion/ (ingestion pipeline)
            - src/ingestion/smart_folder/ (smart folder scan + ingest)
            - src/ingestion/ai/ (AI backend, prompt, response parsing)
            - src/ingestion/mutation_generator.rs (field mapping)
            - ../schema_service/crates/client/ (schema_service_client crate)

            Failure context:
            $(cat /tmp/claude-prompt-context.txt)
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          timeout_minutes: 25
