name: Nightly Integration

# Tier 3 of the CI tier model (see ci-tests.yml header).
#
# Runs against main once per night. Failures are reported via Discord
# (notify.yml hook). nightly-ingestion.yml and nightly-qa-dogfood.yml
# cover orthogonal end-to-end flows.
#
# Two classes of jobs live here:
#
# 1. Tests that have always belonged on a schedule:
#    - perf-tests: benchmark/soak runs
#    - ai-call-tests: ANTHROPIC_API_KEY-gated, runs `--ignored` tests
#    - embedding-model-tests: FastEmbed model download
#
# 2. Tests moved off the merge queue on 2026-05-01 to make merges
#    instant. The merge queue is now a rubber stamp; PR-level CI is
#    the only correctness gate. These jobs catch regressions that
#    slip past PR review (e.g. semantic conflicts between PRs that
#    each pass independently but interact on main):
#    - rust-clippy-doc: clippy --all-targets + doc tests on main
#    - rust-integration: lib + integration tests, 4 shards
#    - face-detection-tests: ONNX face-detection integration
#    - e2e-tests: Playwright UI smoke tests
#
# At ~15-20 PRs/day a nightly failure has many candidate culprits —
# git-bisect over the last day's commits to identify the regression.
on:
  schedule:
    # 09:00 UTC = 02:00 PT — after most North American work, before most
    # European work. Picked to avoid colliding with nightly-ingestion at
    # 03:00 UTC and nightly-qa-dogfood (whatever its time is).
    - cron: "0 9 * * *"
  workflow_dispatch:

# Minimum needed for actions/checkout. Every job in this file is read-only;
# none push branches, write issues, or hit cross-repo APIs. Explicit so
# CodeQL doesn't flag each job individually.
permissions:
  contents: read

concurrency:
  group: nightly-integration
  cancel-in-progress: false

jobs:
  perf-tests:
    name: Performance Tests
    runs-on: ubuntu-latest-m
    timeout-minutes: 30

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: nightly-perf

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      - name: Run mutation_performance_test
        run: cargo test --test mutation_performance_test -- --nocapture

      - name: Run mutation_perf_investigation
        run: cargo test --test mutation_perf_investigation -- --nocapture

  ai-call-tests:
    name: AI-Call Tests (ANTHROPIC_API_KEY)
    runs-on: ubuntu-latest-m
    timeout-minutes: 45
    # Skip if the API key isn't configured. Lets the workflow be enabled
    # in forks without leaking — and is the right behavior on a key
    # rotation gap.
    if: ${{ vars.SKIP_AI_NIGHTLY != 'true' }}

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: "Guard: API key present"
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY not set — AI nightly tests will be skipped at the test layer (#[ignore] guard fires)."
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: nightly-ai

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      # `-- --ignored` runs ONLY the #[ignore]'d tests — tests already
      # exercised on the merge gate are skipped.
      - name: Run AI-gated integration tests
        run: |
          cargo test --features test-utils \
            --test agent_ingestion_test \
            --test ingest_tweets_test \
            --test paintings_schema_consolidation_test \
            --test semantic_schema_naming_test \
            --test smart_folder_ingestion_test \
            --test smart_folder_tweets_test \
            --test twitter_export_scan_test \
            -- --ignored --nocapture

  embedding-model-tests:
    name: Embedding-Model Tests (FastEmbed)
    runs-on: ubuntu-latest-m
    timeout-minutes: 30

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: nightly-embedding

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      # The two FastEmbed-using tests live in distinct files; one runs
      # via #[ignore] guard, the other always runs. Both download the
      # FastEmbed model on first invocation (cached afterward).
      - name: Run FastEmbed-backed integration tests
        run: |
          cargo test --features test-utils \
            --test semantic_field_matching_e2e_test \
            --test schema_service_semantic_match_test \
            -- --ignored --nocapture

  # ─── Moved from merge_group on 2026-05-01 ────────────────────────
  # The four jobs below previously gated every merge. They were moved
  # here so the merge queue can rubber-stamp admitted PRs in seconds.
  # PR-level CI in ci-tests.yml is the gate that prevents bad code
  # from reaching the queue; these nightly runs catch what slips past.

  rust-clippy-doc:
    name: Rust Clippy + Doc Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: nightly-clippy-doc

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      - name: Run clippy (--all-targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run doc tests
        run: cargo test --workspace --doc

  rust-integration:
    name: Rust Integration (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: nightly-integration-shards

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      # Full integration suite, partitioned across 4 shards. nextest
      # discovers all tests, sorts them deterministically, then runs
      # the 1/4-th slice belonging to this shard. --features test-utils
      # enables schema_service_expansion_test and
      # schema_service_semantic_match_test. Face-detection feature is
      # NOT enabled here — face-detection-tests is the dedicated job.
      - name: Run lib + integration tests (shard ${{ matrix.shard }}/4)
        run: cargo nextest run --workspace --features test-utils --partition count:${{ matrix.shard }}/4

  face-detection-tests:
    name: Face Detection Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=mold

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: nightly-face-detection

      - name: Stub frontend dist for rust_embed
        run: mkdir -p src/server/static-react/dist && echo '<html></html>' > src/server/static-react/dist/index.html

      # Pulls a 50 MB ONNX model on first run (cached afterward).
      # Path-filtering is gone now that this is nightly — it runs
      # every night regardless of which files changed.
      - name: Run face-detection integration tests
        run: cargo test --features face-detection --test detect_faces_handler_test -- --nocapture

  e2e-tests:
    name: E2E UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if E2E tests exist
        id: check-e2e
        run: |
          if [ -d src/server/static-react/e2e ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⏭️ **E2E UI Tests** — skipped (no e2e/ directory)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Node.js
        if: steps.check-e2e.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/server/static-react/package-lock.json

      - name: Install dependencies
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npm ci

      - name: Install Playwright browsers
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npx playwright install chromium --with-deps

      - name: Run E2E smoke tests
        if: steps.check-e2e.outputs.exists == 'true'
        working-directory: src/server/static-react
        run: npx playwright test

      - name: Upload test artifacts
        if: failure() && steps.check-e2e.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/server/static-react/test-results/
          retention-days: 7
