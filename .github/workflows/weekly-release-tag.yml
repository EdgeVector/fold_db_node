name: Weekly Release — Tag

# Companion to weekly-release.yml. The release flow is two-step because
# direct pushes to main are blocked by the merge-queue ruleset:
#   1. weekly-release.yml opens a PR that bumps Cargo.toml's version and
#      enables auto-merge. The merge queue squash-merges it onto main.
#   2. (this workflow) detects the merged squash commit by message,
#      extracts the version, and pushes the tag pointing at the merged
#      SHA. Tags don't go through the queue, so this push works.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-on-bump:
    runs-on: ubuntu-latest
    # Match the bump commit message (with or without a trailing PR ref).
    if: |
      startsWith(github.event.head_commit.message, 'chore: bump version to ')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GH_PAT (org-level Actions secret) instead of GITHUB_TOKEN: the
          # auto-generated GITHUB_TOKEN deliberately does NOT trigger
          # `on: push: tags` workflows when it pushes a tag (GitHub's
          # "no recursion" rule), so v0.3.11 was tagged but release.yml +
          # tauri-release.yml never fired. GH_PAT is a real PAT, so its
          # tag pushes do fire downstream workflows. This token is consumed
          # both by the checkout (to set the remote URL) and by
          # `git push origin <tag>` below.
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract version from commit message
        id: extract
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          # Match `chore: bump version to <semver>` followed by anything.
          # Tolerates the squash suffix `(#PR)` and any trailing body.
          VERSION=$(printf '%s\n' "$MSG" \
            | head -1 \
            | sed -nE 's/^chore: bump version to ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p')

          if [ -z "$VERSION" ]; then
            echo "Head commit looked like a release bump but the version did not parse:" >&2
            echo "$MSG" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tagging v$VERSION"

      - name: Create and push tag
        run: |
          VERSION="${{ steps.extract.outputs.version }}"
          # Tag the merged commit (current HEAD on main).
          git tag -a "v$VERSION" -m "Weekly release v$VERSION"
          git push origin "v$VERSION"
