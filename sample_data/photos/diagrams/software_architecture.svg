<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <style>
    text { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .title { font-size: 18px; font-weight: bold; }
    .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  <text x="300" y="30" text-anchor="middle" class="title">Microservices Architecture</text>
  <!-- API Gateway -->
  <rect x="220" y="50" width="160" height="40" rx="5" fill="#4A90D9" opacity="0.8"/>
  <text x="300" y="75" text-anchor="middle" fill="white">API Gateway</text>
  <!-- Services -->
  <rect x="50" y="140" width="120" height="40" rx="5" fill="#7BC67E" opacity="0.8"/>
  <text x="110" y="165" text-anchor="middle" fill="white">Auth Service</text>
  <rect x="240" y="140" width="120" height="40" rx="5" fill="#7BC67E" opacity="0.8"/>
  <text x="300" y="165" text-anchor="middle" fill="white">User Service</text>
  <rect x="430" y="140" width="120" height="40" rx="5" fill="#7BC67E" opacity="0.8"/>
  <text x="490" y="165" text-anchor="middle" fill="white">Order Service</text>
  <!-- Databases -->
  <rect x="50" y="240" width="120" height="40" rx="5" fill="#E8A838" opacity="0.8"/>
  <text x="110" y="265" text-anchor="middle" fill="white">Auth DB</text>
  <rect x="240" y="240" width="120" height="40" rx="5" fill="#E8A838" opacity="0.8"/>
  <text x="300" y="265" text-anchor="middle" fill="white">User DB</text>
  <rect x="430" y="240" width="120" height="40" rx="5" fill="#E8A838" opacity="0.8"/>
  <text x="490" y="265" text-anchor="middle" fill="white">Order DB</text>
  <!-- Message Queue -->
  <rect x="180" y="330" width="240" height="40" rx="5" fill="#D9534F" opacity="0.8"/>
  <text x="300" y="355" text-anchor="middle" fill="white">Message Queue (RabbitMQ)</text>
  <!-- Arrows -->
  <line x1="260" y1="90" x2="130" y2="140" class="arrow"/>
  <line x1="300" y1="90" x2="300" y2="140" class="arrow"/>
  <line x1="340" y1="90" x2="470" y2="140" class="arrow"/>
  <line x1="110" y1="180" x2="110" y2="240" class="arrow"/>
  <line x1="300" y1="180" x2="300" y2="240" class="arrow"/>
  <line x1="490" y1="180" x2="490" y2="240" class="arrow"/>
  <line x1="110" y1="280" x2="220" y2="330" class="arrow"/>
  <line x1="300" y1="280" x2="300" y2="330" class="arrow"/>
  <line x1="490" y1="280" x2="380" y2="330" class="arrow"/>
</svg>