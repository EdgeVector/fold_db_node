<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <style>
    text { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
    .title { font-size: 16px; font-weight: bold; }
    .decision { font-size: 11px; }
    .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#ah); }
    .label { font-size: 10px; fill: #888; }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>
  <text x="250" y="25" text-anchor="middle" class="title">Git Feature Branch Workflow</text>
  <!-- Start -->
  <ellipse cx="250" cy="60" rx="60" ry="20" fill="#4A90D9" opacity="0.8"/>
  <text x="250" y="65" text-anchor="middle" fill="white">Start</text>
  <!-- Create branch -->
  <rect x="175" y="100" width="150" height="35" rx="5" fill="#7BC67E" opacity="0.8"/>
  <text x="250" y="122" text-anchor="middle" fill="white">Create Feature Branch</text>
  <!-- Make changes -->
  <rect x="175" y="160" width="150" height="35" rx="5" fill="#7BC67E" opacity="0.8"/>
  <text x="250" y="182" text-anchor="middle" fill="white">Make Changes</text>
  <!-- Commit -->
  <rect x="175" y="220" width="150" height="35" rx="5" fill="#7BC67E" opacity="0.8"/>
  <text x="250" y="242" text-anchor="middle" fill="white">Commit Changes</text>
  <!-- Tests pass? -->
  <polygon points="250,280 340,310 250,340 160,310" fill="#E8A838" opacity="0.8"/>
  <text x="250" y="314" text-anchor="middle" class="decision" fill="white">Tests Pass?</text>
  <!-- Fix -->
  <rect x="370" y="293" width="100" height="30" rx="5" fill="#D9534F" opacity="0.8"/>
  <text x="420" y="312" text-anchor="middle" fill="white" font-size="11">Fix Issues</text>
  <!-- PR -->
  <rect x="175" y="365" width="150" height="35" rx="5" fill="#7BC67E" opacity="0.8"/>
  <text x="250" y="387" text-anchor="middle" fill="white">Open Pull Request</text>
  <!-- Code Review? -->
  <polygon points="250,420 340,450 250,480 160,450" fill="#E8A838" opacity="0.8"/>
  <text x="250" y="454" text-anchor="middle" class="decision" fill="white">Approved?</text>
  <!-- Merge -->
  <ellipse cx="250" cy="510" rx="60" ry="20" fill="#4A90D9" opacity="0.8"/>
  <text x="250" y="515" text-anchor="middle" fill="white" font-size="11">Merge to Main</text>
  <!-- Arrows -->
  <line x1="250" y1="80" x2="250" y2="100" class="arrow"/>
  <line x1="250" y1="135" x2="250" y2="160" class="arrow"/>
  <line x1="250" y1="195" x2="250" y2="220" class="arrow"/>
  <line x1="250" y1="255" x2="250" y2="280" class="arrow"/>
  <line x1="340" y1="310" x2="370" y2="308" class="arrow"/>
  <text x="348" y="300" class="label">No</text>
  <path d="M420,293 L420,242 L325,242" class="arrow"/>
  <line x1="250" y1="340" x2="250" y2="365" class="arrow"/>
  <text x="255" y="358" class="label">Yes</text>
  <line x1="250" y1="400" x2="250" y2="420" class="arrow"/>
  <line x1="250" y1="480" x2="250" y2="490" class="arrow"/>
  <text x="255" y="488" class="label">Yes</text>
  <path d="M160,450 L80,450 L80,182 L175,182" class="arrow"/>
  <text x="70" y="440" class="label">No</text>
</svg>